<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>骑手换电 · 平台/运营商/渠道商/资金方后台</title>
  <link rel="stylesheet" href="css/app.css">

</head>
<body>
  <div class="app">
    <header class="global-header" id="globalHeader"></header>
    <aside class="sidebar">
      <div class="brand">
        <strong>骑手换电</strong>
        <span>平台 · 运营商 · 渠道商 · 资金方</span>
      </div>
      <div class="tenant">
        当前主体<em id="tenantName">绿色出行</em>
        <span id="tenantType">运营商</span>
        <select class="role-select" id="loginSelect" aria-label="切换登录身份"></select>
        <p class="tree-hint" id="treeHint">运营商 · 换电运营与定价</p>
        <p class="tree-hint" style="margin-top:6px">
          <a href="mobile/index.html" style="color:#5eead4;font-size:12px">→ 骑手端原型</a><br>
          <a href="docs/index.html" id="navDocsLink" target="_blank" rel="noopener" style="color:#5eead4;font-size:12px">→ 产品文档</a>
        </p>
      </div>
      <nav class="nav" id="nav"></nav>
    </aside>
    <main class="main">
      <header class="topbar">
        <div>
          <div class="topbar-title-row">
            <h1 id="pageTitle">总览</h1>
            <span id="pageModuleNote"></span>
          </div>
          <p id="pageDesc">己方站点经营核心指标。</p>
        </div>
      </header>
      <section class="filters" id="pageFilters" aria-label="页面筛选"></section>
      <p class="scope-hint" id="scopeHint">数据范围：当前登录主体名下授权数据（演示数据）。</p>
      <div id="views"></div>
    </main>
  </div>
  <div class="drawer-mask" id="drawerMask"></div>
  <aside class="drawer" id="orderDrawer" aria-hidden="true">
    <div class="drawer-head">
      <div>
        <h3 id="drawerTitle">套餐订单详情</h3>
        <p id="drawerSub"></p>
      </div>
      <button class="btn" type="button" id="closeDrawer">关闭</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
  </aside>
  <div class="note-mask" id="employeeMask"></div>
  <div class="note-modal" id="employeeModal" role="dialog" aria-modal="true">
    <div class="note-head">
      <h3 id="employeeFormTitle">员工</h3>
      <button class="btn" type="button" id="closeEmployeeForm">关闭</button>
    </div>
    <div class="note-body">
      <form id="employeeForm" class="form-grid"></form>
      <div class="form-actions">
        <button class="btn" type="button" id="cancelEmployeeForm">取消</button>
        <button class="btn primary" type="submit" form="employeeForm" id="saveEmployeeForm">保存</button>
      </div>
    </div>
  </div>
  <div class="note-mask" id="pricingMask"></div>
  <div class="note-modal" id="pricingModal" role="dialog" aria-modal="true" style="width:min(480px,calc(100vw - 32px))">
    <div class="note-head">
      <h3 id="pricingFormTitle">编辑零售价</h3>
      <button class="btn" type="button" id="closePricingForm">关闭</button>
    </div>
    <div class="note-body">
      <form id="pricingForm" class="form-grid"></form>
      <div class="form-actions">
        <button class="btn" type="button" id="cancelPricingForm">取消</button>
        <button class="btn primary" type="button" id="savePricingForm">保存（演示）</button>
      </div>
    </div>
  </div>
  <div class="note-mask" id="cardPricingMask"></div>
  <div class="note-modal" id="cardPricingModal" role="dialog" aria-modal="true" style="width:min(520px,calc(100vw - 32px))">
    <div class="note-head">
      <h3 id="cardPricingFormTitle">渠道分销价</h3>
      <button class="btn" type="button" id="closeCardPricingForm">关闭</button>
    </div>
    <div class="note-body">
      <form id="cardPricingForm" class="form-grid"></form>
      <div class="form-actions">
        <button class="btn" type="button" id="cancelCardPricingForm">取消</button>
        <button class="btn primary" type="button" id="saveCardPricingForm">保存（演示）</button>
      </div>
    </div>
  </div>
  <div class="note-mask" id="quotaPricingMask"></div>
  <div class="note-modal" id="quotaPricingModal" role="dialog" aria-modal="true" style="width:min(520px,calc(100vw - 32px))">
    <div class="note-head">
      <h3 id="quotaPricingFormTitle">人天批发价</h3>
      <button class="btn" type="button" id="closeQuotaPricingForm">关闭</button>
    </div>
    <div class="note-body">
      <form id="quotaPricingForm" class="form-grid"></form>
      <div class="form-actions">
        <button class="btn" type="button" id="cancelQuotaPricingForm">取消</button>
        <button class="btn primary" type="button" id="saveQuotaPricingForm">保存（演示）</button>
      </div>
    </div>
  </div>
  <div class="note-mask" id="operatorMask"></div>
  <div class="note-modal" id="operatorModal" role="dialog" aria-modal="true" style="width:min(520px,calc(100vw - 32px))">
    <div class="note-head">
      <h3 id="operatorFormTitle">运营商</h3>
      <button class="btn" type="button" id="closeOperatorForm">关闭</button>
    </div>
    <div class="note-body">
      <form id="operatorForm" class="form-grid"></form>
      <div class="form-actions">
        <button class="btn" type="button" id="cancelOperatorForm">取消</button>
        <button class="btn primary" type="button" id="saveOperatorForm">保存（演示）</button>
      </div>
    </div>
  </div>
  <div class="note-mask" id="platformFeeRateMask"></div>
  <div class="note-modal" id="platformFeeRateModal" role="dialog" aria-modal="true" style="width:min(480px,calc(100vw - 32px))">
    <div class="note-head">
      <h3 id="platformFeeRateFormTitle">平台服务费比例</h3>
      <button class="btn" type="button" id="closePlatformFeeRateForm">关闭</button>
    </div>
    <div class="note-body">
      <form id="platformFeeRateForm" class="form-grid"></form>
      <div class="form-actions">
        <button class="btn" type="button" id="cancelPlatformFeeRateForm">取消</button>
        <button class="btn primary" type="button" id="savePlatformFeeRateForm">保存并生效（演示）</button>
      </div>
    </div>
  </div>
  <div class="note-mask" id="leasingCompanyMask"></div>
  <div class="note-modal" id="leasingCompanyModal" role="dialog" aria-modal="true" style="width:min(520px,calc(100vw - 32px))">
    <div class="note-head">
      <h3 id="leasingCompanyFormTitle">设备租赁公司</h3>
      <button class="btn" type="button" id="closeLeasingCompanyForm">关闭</button>
    </div>
    <div class="note-body">
      <form id="leasingCompanyForm" class="form-grid"></form>
      <div class="form-actions">
        <button class="btn" type="button" id="cancelLeasingCompanyForm">取消</button>
        <button class="btn primary" type="button" id="saveLeasingCompanyForm">保存（演示）</button>
      </div>
    </div>
  </div>
  <div class="note-mask" id="leaseBindingMask"></div>
  <div class="note-modal" id="leaseBindingModal" role="dialog" aria-modal="true" style="width:min(520px,calc(100vw - 32px))">
    <div class="note-head">
      <h3 id="leaseBindingFormTitle">新建租赁关系绑定</h3>
      <button class="btn" type="button" id="closeLeaseBindingForm">关闭</button>
    </div>
    <div class="note-body">
      <form id="leaseBindingForm" class="form-grid"></form>
      <div class="form-actions">
        <button class="btn" type="button" id="cancelLeaseBindingForm">取消</button>
        <button class="btn primary" type="button" id="saveLeaseBindingForm">确认绑定（演示）</button>
      </div>
    </div>
  </div>
  <div class="note-mask" id="siteMask"></div>
  <div class="note-modal" id="siteModal" role="dialog" aria-modal="true" style="width:min(520px,calc(100vw - 32px))">
    <div class="note-head">
      <h3 id="siteFormTitle">站点</h3>
      <button class="btn" type="button" id="closeSiteForm">关闭</button>
    </div>
    <div class="note-body">
      <form id="siteForm" class="form-grid"></form>
      <div class="form-actions">
        <button class="btn" type="button" id="cancelSiteForm">取消</button>
        <button class="btn primary" type="button" id="saveSiteForm">保存（演示）</button>
      </div>
    </div>
  </div>
  <div class="note-mask" id="channelPartnerMask"></div>
  <div class="note-modal" id="channelPartnerModal" role="dialog" aria-modal="true" style="width:min(720px,calc(100vw - 32px))">
    <div class="note-head">
      <h3 id="channelPartnerFormTitle">渠道商</h3>
      <button class="btn" type="button" id="closeChannelPartnerForm">关闭</button>
    </div>
    <div class="note-body">
      <form id="channelPartnerForm" class="form-grid"></form>
      <div class="form-actions">
        <button class="btn" type="button" id="cancelChannelPartnerForm">取消</button>
        <button class="btn primary" type="button" id="saveChannelPartnerForm">保存（演示）</button>
      </div>
    </div>
  </div>
  <div class="note-mask" id="bindMask"></div>
  <div class="note-modal" id="bindModal" role="dialog" aria-modal="true" style="width:min(480px,calc(100vw - 32px))">
    <div class="note-head">
      <h3 id="bindFormTitle">绑定设备至运营商</h3>
      <button class="btn" type="button" id="closeBindForm">关闭</button>
    </div>
    <div class="note-body">
      <form id="bindForm" class="form-grid"></form>
      <div class="form-actions">
        <button class="btn" type="button" id="cancelBindForm">取消</button>
        <button class="btn primary" type="button" id="saveBindForm">确认绑定</button>
      </div>
    </div>
  </div>
  <div class="note-mask" id="poolMask"></div>
  <div class="note-modal" id="poolModal" role="dialog" aria-modal="true" style="width:min(640px,calc(100vw - 32px))">
    <div class="note-head">
      <h3 id="poolFormTitle">额度池</h3>
      <button class="btn" type="button" id="closePoolForm">关闭</button>
    </div>
    <div class="note-body">
      <form id="poolForm" class="form-grid"></form>
      <div class="form-actions">
        <button class="btn" type="button" id="cancelPoolForm">取消</button>
        <button class="btn primary" type="button" id="savePoolForm">保存</button>
      </div>
    </div>
  </div>
  <div class="note-mask" id="leaseMask"></div>
  <div class="note-modal" id="leaseModal" role="dialog" aria-modal="true" style="width:min(560px,calc(100vw - 32px))">
    <div class="note-head">
      <h3 id="leaseFormTitle">租赁协议</h3>
      <button class="btn" type="button" id="closeLeaseForm">关闭</button>
    </div>
    <div class="note-body">
      <form id="leaseForm" class="form-grid"></form>
      <div class="form-actions">
        <button class="btn" type="button" id="cancelLeaseForm">取消</button>
        <button class="btn primary" type="button" id="saveLeaseForm">提交</button>
      </div>
    </div>
  </div>
  <div class="note-mask" id="followMask"></div>
  <div class="note-modal" id="followModal" role="dialog" aria-modal="true" style="width:min(440px,calc(100vw - 32px))">
    <div class="note-head">
      <h3 id="followFormTitle">登记跟进</h3>
      <button class="btn" type="button" id="closeFollowForm">关闭</button>
    </div>
    <div class="note-body">
      <form id="followForm" class="form-grid"></form>
      <div class="form-actions">
        <button class="btn" type="button" id="cancelFollowForm">取消</button>
        <button class="btn primary" type="button" id="saveFollowForm">保存</button>
      </div>
    </div>
  </div>
  <div class="note-mask" id="deviceListMask"></div>
  <div class="note-modal" id="deviceListModal" role="dialog" aria-modal="true" style="width:min(560px,calc(100vw - 32px))">
    <div class="note-head">
      <h3 id="deviceListFormTitle">设备清单</h3>
      <button class="btn" type="button" id="closeDeviceListForm">关闭</button>
    </div>
    <div class="note-body">
      <form id="deviceListForm" class="form-grid"></form>
      <div class="form-actions">
        <button class="btn" type="button" id="cancelDeviceListForm">取消</button>
        <button class="btn primary" type="button" id="saveDeviceListForm">保存</button>
      </div>
    </div>
  </div>
  <div class="note-mask" id="deviceReplaceMask"></div>
  <div class="note-modal" id="deviceReplaceModal" role="dialog" aria-modal="true" style="width:min(480px,calc(100vw - 32px))">
    <div class="note-head">
      <h3 id="deviceReplaceFormTitle">设备替换</h3>
      <button class="btn" type="button" id="closeDeviceReplaceForm">关闭</button>
    </div>
    <div class="note-body">
      <form id="deviceReplaceForm" class="form-grid"></form>
      <div class="form-actions">
        <button class="btn" type="button" id="cancelDeviceReplaceForm">取消</button>
        <button class="btn primary" type="button" id="saveDeviceReplaceForm">确认替换</button>
      </div>
    </div>
  </div>
  <div class="note-mask" id="rentPayMask"></div>
  <div class="note-modal" id="rentPayModal" role="dialog" aria-modal="true" style="width:min(520px,calc(100vw - 32px))">
    <div class="note-head">
      <h3 id="rentPayFormTitle">补缴租金</h3>
      <button class="btn" type="button" id="closeRentPayForm">关闭</button>
    </div>
    <div class="note-body">
      <form id="rentPayForm" class="form-grid"></form>
      <div class="form-actions">
        <button class="btn" type="button" id="cancelRentPayForm">取消</button>
        <button class="btn primary" type="button" id="saveRentPayForm">确认提交</button>
      </div>
    </div>
  </div>
  <div class="note-mask" id="rentTopupMask"></div>
  <div class="note-modal" id="rentTopupModal" role="dialog" aria-modal="true" style="width:min(520px,calc(100vw - 32px))">
    <div class="note-head">
      <h3 id="rentTopupFormTitle">月租缴纳</h3>
      <button class="btn" type="button" id="closeRentTopupForm">关闭</button>
    </div>
    <div class="note-body">
      <form id="rentTopupForm" class="form-grid"></form>
      <div class="form-actions">
        <button class="btn" type="button" id="cancelRentTopupForm">取消</button>
        <button class="btn primary" type="button" id="saveRentTopupForm">提交充值申请</button>
      </div>
    </div>
  </div>
  <div class="note-mask" id="noteMask"></div>
  <div class="note-modal" id="noteModal" role="dialog" aria-modal="true">
    <div class="note-head">
      <h3 id="noteTitle">模块说明</h3>
      <button class="btn" type="button" id="closeNote">关闭</button>
    </div>
    <div class="note-body" id="noteBody"></div>
  </div>
  <div id="protoToast" class="proto-toast" role="status" aria-live="polite"></div>
  <div class="note-mask" id="protoFormMask"></div>
  <div class="note-modal" id="protoFormModal" role="dialog" aria-modal="true" style="width:min(480px,calc(100vw - 32px))">
    <div class="note-head">
      <h3 id="protoFormTitle">填写信息</h3>
      <button class="btn" type="button" id="closeProtoForm">关闭</button>
    </div>
    <div class="note-body">
      <div id="protoFormSuccess" class="proto-form-msg success" hidden></div>
      <div id="protoFormError" class="proto-form-msg error" hidden></div>
      <form id="protoForm" class="form-grid"></form>
      <div class="form-actions" id="protoFormActions">
        <button class="btn" type="button" id="cancelProtoForm">取消</button>
        <button class="btn primary" type="button" id="submitProtoForm">确定</button>
      </div>
    </div>
  </div>
  <div class="note-mask" id="protoConfirmMask"></div>
  <div class="note-modal" id="protoConfirmModal" role="dialog" aria-modal="true" style="width:min(420px,calc(100vw - 32px))">
    <div class="note-head">
      <h3 id="protoConfirmTitle">确认</h3>
    </div>
    <div class="note-body">
      <p id="protoConfirmMessage" style="margin:0 0 16px"></p>
      <div class="form-actions">
        <button class="btn" type="button" id="cancelProtoConfirm">取消</button>
        <button class="btn primary" type="button" id="okProtoConfirm">确定</button>
      </div>
    </div>
  </div>
  <div class="note-mask data-panel-mask" id="dataPanelMask"></div>
  <div class="data-panel-modal" id="dataPanelModal" role="dialog" aria-modal="true" aria-labelledby="dataPanelTitle">
    <div class="note-head">
      <div>
        <h3 id="dataPanelTitle">数据面板</h3>
        <p class="data-panel-sub" id="dataPanelSub">运营数据可视化</p>
      </div>
      <button class="btn data-panel-close" type="button" id="closeDataPanel" aria-label="关闭">×</button>
    </div>
    <div class="data-panel-body">
      <iframe id="dataPanelFrame" title="数据面板" loading="lazy"></iframe>
    </div>
  </div>
  <script src="js/config-mock.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
