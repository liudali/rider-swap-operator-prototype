<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>智格换电 · 骑手端</title>
  <style>
    :root {
      --blue: #2f6bff;
      --blue-dark: #1a4fd6;
      --gold: #e8c9a0;
      --gold-text: #8b6914;
      --bg: #f4f6f8;
      --text: #1a2233;
      --muted: #8a94a6;
      --border: #e8ecf0;
      --warn: #fff8e6;
      --warn-border: #f0d878;
      --danger: #e34d4d;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --phone-w: 390px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: #dfe3ea;
      color: var(--text);
      min-height: 100vh;
    }
    .workspace {
      display: flex;
      gap: 20px;
      padding: 16px;
      justify-content: center;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .demo-panel {
      width: 280px;
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      font-size: 13px;
    }
    .demo-panel h2 { font-size: 14px; margin-bottom: 10px; }
    .demo-panel label { display: block; margin: 8px 0 4px; color: var(--muted); }
    .demo-panel select, .demo-panel button {
      width: 100%; padding: 8px 10px; border-radius: 8px;
      border: 1px solid var(--border); font-size: 13px;
    }
    .demo-panel button.primary {
      background: var(--blue); color: #fff; border: none; margin-top: 10px; cursor: pointer;
    }
    .demo-panel a { color: var(--blue); font-size: 12px; }
    .phone-wrap {
      width: var(--phone-w);
      height: calc(100vh - 32px);
      max-height: 844px;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(15,23,42,.18);
      background: #fff;
      display: flex;
      flex-direction: column;
    }
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: calc(6px + var(--safe-top)) 16px 4px;
      font-size: 14px; font-weight: 600; background: #fff; flex-shrink: 0;
    }
    .status-icons { display: flex; gap: 4px; font-size: 12px; align-items: center; }
    .wx-capsule {
      display: flex; border: 1px solid #ddd; border-radius: 16px; overflow: hidden; margin-left: 8px;
    }
    .wx-capsule span { padding: 4px 10px; font-size: 12px; }
    .wx-capsule span + span { border-left: 1px solid #ddd; }
    .app-header {
      text-align: center; font-size: 17px; font-weight: 600;
      padding: 6px 0 8px; background: #fff; flex-shrink: 0;
    }
    .service-banner {
      background: #fffbe8; color: #7a6520; font-size: 11px;
      text-align: center; padding: 6px 12px; flex-shrink: 0;
    }
    .screen {
      flex: 1; overflow: hidden; display: none; flex-direction: column;
      background: var(--bg); position: relative;
    }
    .screen.active { display: flex; }

    /* 首页地图 */
    .map-area {
      flex: 1; position: relative;
      background: linear-gradient(180deg, #dce8f5 0%, #e8eef4 40%, #d4e4d0 100%);
      overflow: hidden;
    }
    .map-area::before {
      content: ""; position: absolute; inset: 0; opacity: .35;
      background-image:
        linear-gradient(#b8c8d8 1px, transparent 1px),
        linear-gradient(90deg, #b8c8d8 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .map-label {
      position: absolute; font-size: 11px; color: #5a7088; font-weight: 500;
    }
    .map-pin {
      position: absolute; width: 28px; height: 36px;
      transform: translate(-50%, -100%); cursor: pointer;
    }
    .map-pin::before {
      content: ""; position: absolute; left: 50%; bottom: 0;
      width: 10px; height: 10px; background: var(--blue);
      border-radius: 50%; transform: translateX(-50%);
      box-shadow: 0 0 0 4px rgba(47,107,255,.25);
    }
    .map-pin.dedicated::before { background: #1677ff; box-shadow: 0 0 0 4px rgba(22,119,255,.25); }
    .map-legend { position: absolute; left: 10px; bottom: 72px; font-size: 10px; color: var(--muted); background: rgba(255,255,255,.92); padding: 6px 8px; border-radius: 6px; max-width: 148px; line-height: 1.5; }
    .map-pin::after {
      content: ""; position: absolute; left: 50%; top: 0;
      width: 22px; height: 22px; background: var(--danger);
      border-radius: 50% 50% 50% 0; transform: translateX(-50%) rotate(-45deg);
      border: 2px solid #fff;
    }
    .map-pin.dedicated::after { background: #1677ff; }
    .map-provider {
      position: absolute; right: 8px; bottom: 100px;
      font-size: 10px; color: var(--muted); background: rgba(255,255,255,.8);
      padding: 2px 6px; border-radius: 4px;
    }
    .map-fab-row {
      position: absolute; left: 0; right: 0; bottom: 12px;
      display: flex; align-items: flex-end; justify-content: center; gap: 12px; padding: 0 16px;
    }
    .fab-circle {
      width: 44px; height: 44px; border-radius: 50%; background: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,.12); border: none;
      font-size: 18px; cursor: pointer; display: grid; place-items: center;
    }
    .fab-scan {
      flex: 1; max-width: 200px; height: 48px; border-radius: 24px;
      background: var(--blue); color: #fff; border: none; font-size: 16px; font-weight: 600;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 16px rgba(47,107,255,.4); cursor: pointer;
    }

    /* 底部导航 */
    .tab-bar {
      display: flex; background: #fff; border-top: 1px solid var(--border);
      padding-bottom: var(--safe-bottom); flex-shrink: 0;
    }
    .tab-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 8px 0 6px; font-size: 11px; color: var(--muted);
      border: none; background: none; cursor: pointer;
    }
    .tab-item.active { color: var(--blue); font-weight: 600; }
    .tab-item .icon { font-size: 22px; line-height: 1; margin-bottom: 2px; }

    /* 我的 */
    .mine-scroll { flex: 1; overflow-y: auto; }
    .login-hero {
      padding: 48px 24px 32px; text-align: center; background: #fff;
    }
    .logo {
      width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 16px;
      background: linear-gradient(135deg, #1a2233, #3d4f6f);
      display: grid; place-items: center; color: #fff; font-size: 28px; font-weight: 800;
    }
    .login-hero h1 { font-size: 26px; letter-spacing: 2px; margin-bottom: 8px; }
    .login-hero p { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .btn-login {
      width: 100%; max-width: 320px; height: 48px; border-radius: 24px;
      background: var(--blue); color: #fff; border: none; font-size: 16px; font-weight: 600; cursor: pointer;
    }
    .agree-row {
      display: flex; gap: 8px; align-items: flex-start; margin-top: 20px;
      font-size: 12px; color: var(--muted); text-align: left; max-width: 320px; margin-left: auto; margin-right: auto;
    }
    .agree-row a { color: var(--blue); }
    .profile-head {
      display: flex; align-items: center; padding: 16px; background: #fff; gap: 12px;
    }
    .avatar {
      width: 48px; height: 48px; border-radius: 50%; background: #e8ecf0;
      display: grid; place-items: center; font-size: 20px;
    }
    .profile-head .phone { font-size: 18px; font-weight: 600; }
    .tag-sm {
      display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px;
      background: #f0f2f5; color: var(--muted); margin-left: 8px;
    }
    .tag-sm.ok { background: #e6f7ee; color: #1a8f4a; }
    .settings-btn {
      margin-left: auto; border: none; background: none; font-size: 22px; cursor: pointer; color: var(--muted);
    }
    .service-card {
      margin: 12px 16px; padding: 18px 16px; border-radius: 12px;
      background: linear-gradient(135deg, #3d7bff 0%, #2f6bff 50%, #1a4fd6 100%);
      color: #fff; display: flex; align-items: center; justify-content: space-between;
      min-height: 88px; position: relative; overflow: hidden;
    }
    .service-card::after {
      content: "⚡"; position: absolute; right: 12px; bottom: -8px;
      font-size: 64px; opacity: .15;
    }
    .service-card h3 { font-size: 17px; margin-bottom: 6px; }
    .service-card p { font-size: 12px; opacity: .9; }
    .service-card.warn { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .service-card.channel { background: linear-gradient(135deg, #6366f1, #4f46e5); }
    .btn-gold {
      background: var(--gold); color: var(--gold-text); border: none;
      padding: 10px 18px; border-radius: 20px; font-size: 14px; font-weight: 600;
      cursor: pointer; flex-shrink: 0; z-index: 1;
    }
    .section-card {
      margin: 0 16px 12px; background: #fff; border-radius: 12px; padding: 14px 12px;
    }
    .section-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; padding-left: 4px; }
    .grid-4 {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px 4px;
    }
    .grid-item {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 8px 4px; border: none; background: none; cursor: pointer; font-size: 11px; color: var(--text);
    }
    .grid-item .gi {
      width: 40px; height: 40px; border-radius: 10px;
      display: grid; place-items: center; font-size: 20px;
      background: #eef3ff; color: var(--blue);
    }
    .grid-item .gi.orange { background: #fff4e6; color: #f97316; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .grid-2 .grid-item { flex-direction: row; justify-content: flex-start; padding: 12px; gap: 10px; }
    .grid-2 .gi { width: 36px; height: 36px; font-size: 18px; flex-shrink: 0; }

    /* 订单 */
    .sub-tabs {
      display: flex; background: #fff; padding: 0 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .sub-tab {
      flex: 1; padding: 12px 0; border: none; background: none; font-size: 14px;
      color: var(--muted); cursor: pointer; position: relative;
    }
    .sub-tab.active { color: var(--blue); font-weight: 600; }
    .sub-tab.active::after {
      content: ""; position: absolute; left: 20%; right: 20%; bottom: 0;
      height: 2px; background: var(--blue); border-radius: 1px;
    }
    .order-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
    .order-card {
      background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }
    .order-card .top { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .order-card .id { font-size: 13px; font-weight: 600; }
    .order-card .status { font-size: 12px; color: var(--blue); }
    .order-card .status.fail { color: var(--danger); }
    .order-card .meta { font-size: 12px; color: var(--muted); line-height: 1.6; }
    .empty {
      text-align: center; padding: 48px 24px; color: var(--muted); font-size: 14px;
    }
    .empty .icon { font-size: 48px; margin-bottom: 12px; opacity: .4; }

    /* 弹层 */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100;
      display: none; align-items: flex-end; justify-content: center;
    }
    .overlay.open { display: flex; }
    .sheet {
      width: 100%; max-width: var(--phone-w); max-height: 85vh;
      background: #fff; border-radius: 16px 16px 0 0; overflow: hidden;
      display: flex; flex-direction: column; animation: slideUp .25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .sheet-head h3 { font-size: 16px; }
    .sheet-close { border: none; background: none; font-size: 22px; cursor: pointer; color: var(--muted); }
    .sheet-body { padding: 16px; overflow-y: auto; flex: 1; }
    .pkg-card {
      border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px;
      cursor: pointer; transition: border-color .15s;
    }
    .pkg-card:hover, .pkg-card.selected { border-color: var(--blue); background: #f8faff; }
    .pkg-card h4 { font-size: 15px; margin-bottom: 4px; }
    .pkg-card .price { color: var(--danger); font-size: 18px; font-weight: 700; }
    .pkg-card .desc { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .btn-block {
      width: 100%; height: 44px; border-radius: 22px; border: none;
      background: var(--blue); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .btn-block:disabled { opacity: .45; cursor: not-allowed; }
    .scan-box {
      text-align: center; padding: 32px 16px;
    }
    .scan-frame {
      width: 200px; height: 200px; margin: 0 auto 20px; border: 2px solid var(--blue);
      border-radius: 12px; position: relative; overflow: hidden;
      background: #000;
    }
    .scan-line {
      position: absolute; left: 8px; right: 8px; height: 2px; background: var(--blue);
      box-shadow: 0 0 8px var(--blue); animation: scan 2s linear infinite;
    }
    @keyframes scan { 0%,100% { top: 10%; } 50% { top: 85%; } }
    .toast {
      position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,.78); color: #fff; padding: 12px 20px; border-radius: 8px;
      font-size: 14px; z-index: 200; display: none; max-width: 280px; text-align: center;
    }
    .toast.show { display: block; }
    .result-ok { text-align: center; padding: 24px; }
    .result-ok .big { font-size: 48px; margin-bottom: 12px; }
    .form-row { margin-bottom: 14px; }
    .form-row label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .form-row input {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px;
    }
    .channel-attr-banner {
      background: linear-gradient(90deg, #fff7e6, #fff);
      border: 1px solid #ffd666; border-radius: 10px; padding: 10px 12px;
      font-size: 12px; line-height: 1.6; color: #7a6520; margin-bottom: 12px;
    }
    .pkg-card .price-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
    .pkg-card .price-official { font-size: 13px; color: var(--muted); text-decoration: line-through; }
    .pkg-card .price-tag { font-size: 10px; background: #fff1f0; color: #cf1322; padding: 2px 6px; border-radius: 4px; }
    .service-scope-banner {
      margin: 0 12px 10px; padding: 10px 12px; border-radius: 10px; background: #ecfdf5;
      border: 1px solid #99f6e4; font-size: 12px; color: #0f766e; line-height: 1.5;
    }
    .service-scope-banner strong { color: #115e59; }
    .op-pick-item {
      display: flex; justify-content: space-between; align-items: center; padding: 14px 12px;
      border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; cursor: pointer;
    }
    .op-pick-item:hover { border-color: var(--brand); background: #f0fdf9; }
    .op-pick-item small { color: var(--muted); display: block; margin-top: 4px; }
    @media (max-width: 720px) {
      .demo-panel { width: 100%; order: 2; }
      .phone-wrap { width: 100%; max-width: var(--phone-w); height: 100vh; max-height: none; border-radius: 0; }
      .workspace { padding: 0; }
    }
  </style>
</head>
<body>
  <div class="workspace">
    <aside class="demo-panel">
      <h2>演示控制台</h2>
      <p style="color:var(--muted);margin-bottom:10px">切换骑手身份，体验不同权益与拦截规则。</p>
      <label>登录身份</label>
      <select id="demoRole">
        <option value="guest">未登录</option>
        <option value="personal" selected>个人套餐 · 张骑手 U1028</option>
        <option value="personal_cross3">个人跨网·案例3 · U1028</option>
        <option value="cooling_refund">冷静期退款 · 李骑手 U2188（开通第3天）</option>
        <option value="channel">渠道人天 · 孙骑手 U2110（分配即开通·已预占）</option>
        <option value="channel_fail">渠道预占失败 · 赵骑手 U2103（自费兜底）</option>
        <option value="channel_cross3">渠道跨网·案例3 · 王骑手 U2088</option>
        <option value="lease_whitelist">设备租赁白名单 · 付费已购 U4001</option>
        <option value="lease_whitelist_new">设备租赁白名单 · 付费未购 U4003</option>
        <option value="lease_whitelist_free">设备租赁白名单 · 免费 U4005</option>
        <option value="lease_suspended">渠道停服·持电池 · 张配送 U4001</option>
        <option value="lease_suspended_nobat">渠道停服·未持电池 · 王夜配 U4003</option>
        <option value="lease_blocked">非白名单拦截 · 路人 U9999</option>
        <option value="card_link_guest">骑士卡链接 · 未登录（刚扫码进入）</option>
        <option value="card_link_kyc">骑士卡链接 · 已登录未实名（24h 归因中）</option>
        <option value="card_link_attr">骑士卡链接 · 已实名（24h 渠道专享价）</option>
        <option value="none">已登录 · 未开通服务</option>
        <option value="geo_ambiguous">冷启动 · 定位两 OP 接近</option>
        <option value="frozen">个人套餐 · 已冻结</option>
        <option value="pending_pickup">个人套餐 · 解冻待领电池</option>
      </select>
      <label>扫码站点</label>
      <select id="demoSite">
        <option value="ST-SH-01">浦东骑手驿站（OP-SX）</option>
        <option value="ST-SH-02">世博换电服务点（OP-SX）</option>
        <option value="ST-SH-04">陆家嘴分站（跨运营商 · OP-LJZ）</option>
        <option value="ST-SH-JD">京东物流专属站（设备租赁·OP-SX）</option>
        <option value="ST-BJ-01">滨江换电站（案例3·U/C/B三方·跨网¥0.6）</option>
      </select>
      <label style="margin-top:10px">定位场景（方案乙）</label>
      <select id="demoGeo">
        <option value="auto_unique">自动命中 · 最近 OP-SX（1.2km）</option>
        <option value="ambiguous">两 OP 接近 · 需手动选择</option>
        <option value="denied">用户拒绝定位</option>
        <option value="no_nearby">15km 内无在营站</option>
      </select>
      <label style="margin-top:10px">OP-SX 换电范围（演示开关）</label>
      <label style="display:flex;gap:8px;align-items:center;font-weight:400"><input type="checkbox" id="policyCrossNet" checked /> 允许跨网换电</label>
      <p style="font-size:11px;color:var(--muted);margin:8px 0 0">设备租赁专属站仅对白名单用户在地图展示（切换身份后看重绘）。</p>
      <button type="button" class="primary" id="applyDemo">应用并重绘</button>
      <p style="margin-top:14px"><a href="../index.html">← 返回运营商后台原型</a></p>
      <p style="margin-top:6px"><a id="navDocsLink" href="../docs/index.html">📄 产品文档（全部）</a></p>
    </aside>

    <div class="phone-wrap" id="phone">
      <div class="status-bar">
        <span id="clock">11:24</span>
        <div class="status-icons">
          <span>5G</span><span>▮▮▮</span><span>75%</span>
          <div class="wx-capsule"><span>···</span><span>◎</span></div>
        </div>
      </div>
      <div class="app-header" id="pageTitle">首页</div>
      <div class="service-banner">客服电话 400-607-2666　服务时间 8:00-24:00</div>

      <!-- 首页 -->
      <div class="screen active" id="screen-home" data-title="首页">
        <div class="map-area" id="mapArea">
          <span class="map-label" style="left:18%;top:22%">博奥路</span>
          <span class="map-label" style="left:55%;top:38%">机场公路</span>
          <span class="map-label" style="left:30%;top:55%">绿色出行</span>
          <div class="map-pin" style="left:42%;top:48%" data-site="ST-SH-01" title="浦东骑手驿站"></div>
          <div class="map-pin" style="left:52%;top:62%" data-site="ST-SH-02" title="世博换电服务点"></div>
          <div class="map-pin" style="left:68%;top:35%" data-site="ST-SH-04" title="陆家嘴分站"></div>
          <div class="map-pin" style="left:25%;top:70%" data-site="ST-BJ-01" title="滨江换电站"></div>
          <div id="mapPins"></div>
          <div class="map-legend" id="mapLegend"></div>
          <span class="map-provider">腾讯地图 · 演示</span>
          <div class="map-fab-row">
            <button type="button" class="fab-circle" id="btnHelp" title="帮助">?</button>
            <button type="button" class="fab-scan" id="btnScan">⊞ 扫一扫</button>
            <button type="button" class="fab-circle" id="btnLocate" title="定位">⌖</button>
          </div>
        </div>
      </div>

      <!-- 订单 -->

      if (!site.channelDedicated) return true;

      state.session.contextOperatorId = opId;
      state.session.contextSource = source;
      state.session.nearestSiteId = siteId || null;
      state.session.nearestDistanceM = distanceM != null ? distanceM : null;

    function activePackageOperator(u) {
      if (u.entitlement === "个人套餐" && (u.status === "服务中" || u.status === "已冻结") && u.operator) return u.operator;
      return null;
    }

    function geoResolve() {
      const scenario = state.geoScenario || "auto_unique";
      if (scenario === "denied") return { blocked: true, reason: "denied" };
      if (scenario === "no_nearby") return { blocked: true, reason: "no_nearby" };
      if (scenario === "ambiguous" || user().geoAmbiguous) {
        return {
          needPick: true,
          candidates: [
            { operatorId: "OP-SX", name: OPERATORS["OP-SX"].name, nearestSiteId: "ST-SH-01", distanceM: 800 },
            { operatorId: "OP-LJZ", name: OPERATORS["OP-LJZ"].name, nearestSiteId: "ST-SH-04", distanceM: 950 }
          ]
        };
      }
      return {
        auto: true,
        operatorId: "OP-SX",
        name: OPERATORS["OP-SX"].name,
        nearestSiteId: "ST-SH-01",
        distanceM: 1200
      };
    }

    function resolveSellerOperator(u) {
      if (u.entitlement === "设备租赁白名单" && u.whitelist) {
        const chId = u.channelId || "CH-RENT";
        return { channelId: chId, source: "lease_whitelist" };
      }
      const pkgOp = activePackageOperator(u);
      if (pkgOp) return { operatorId: pkgOp, source: "active_pkg" };
      if (u.channelAttr?.operatorId) return { operatorId: u.channelAttr.operatorId, source: "launch" };
      if (state.session.launchOp) return { operatorId: state.session.launchOp, source: "launch" };
      if (state.session.scanCabinetOp) return { operatorId: state.session.scanCabinetOp, source: "scan" };
      if (state.session.contextOperatorId) {
        return { operatorId: state.session.contextOperatorId, source: state.session.contextSource || "geo_auto" };
      }
      return null;
    }

    function formatDistance(m) {
      return m >= 1000 ? (m / 1000).toFixed(1) + "km" : m + "m";
    }

      const u = user();
      const resolved = resolveSellerOperator(u);

      if (resolved.channelId && CHANNELS[resolved.channelId]) {

      }
      const op = OPERATORS[resolved.operatorId];
      if (!op) return "";
      const site = state.session.nearestSiteId ? SITES[state.session.nearestSiteId] : null;
      const dist = state.session.nearestDistanceM != null ? formatDistance(state.session.nearestDistanceM) : "";
      const srcLabel = {
        active_pkg: "续费原运营商",
        launch: "推广链接",
        scan: "扫柜进入",
        geo_auto: "定位自动匹配",
        geo_manual: "您已选择"
      }[resolved.source] || "";
      const siteLine = site && dist ? ` · 距您最近 ${site.name} ${dist}` : "";
      return `<div class="service-scope-banner">当前服务：<strong>${op.name}</strong>${siteLine}${srcLabel ? `<br><small>${srcLabel} · 支付将进入该运营商账户</small>` : ""}</div>`;

      body.querySelectorAll("[data-op-pick]").forEach(el => {
        el.onclick = () => {
          setSessionOperator(el.dataset.opPick, "geo_manual", el.dataset.site, Number(el.dataset.dist));
          closeOverlay("overlayOpPick");
          renderMine();
          if (onReady) onReady();
        };
      });
      openOverlay("overlayOpPick");
    }

    function ensureContextForPurchase(onReady) {
      const u = user();
      if (!u.loggedIn) { toast("请先登录"); switchTab("mine"); return; }
      if (u.entitlement === "设备租赁白名单" && u.whitelist) { onReady(); return; }
      const existing = resolveSellerOperator(u);
      if (existing?.source === "active_pkg") { onReady(); return; }
      if (existing && state.session.contextOperatorId) { onReady(); return; }
      if (u.channelAttr?.operatorId) {
        setSessionOperator(u.channelAttr.operatorId, "launch");
        onReady();
        return;
      }
      const geo = geoResolve();
      if (geo.blocked) {
        toast(geo.reason === "denied" ? "请开启定位，或扫描换电柜二维码后再购套餐" : "附近暂无换电服务，请移步换电柜扫码");
        return;
      }
      if (geo.needPick) {
        openOperatorPicker(geo.candidates, onReady);
        return;
      }
      if (geo.auto) {
        setSessionOperator(geo.operatorId, "geo_auto", geo.nearestSiteId, geo.distanceM);
        renderMine();
        onReady();
        return;
      }
      toast("无法确定服务运营商，请扫描换电柜二维码");
    }

    function openPurchaseFlow() {
      ensureContextForPurchase(() => {
        const u = user();
        if (!u.kyc) { openOverlay("overlayKyc"); return; }
        renderPkgOverlay();
        openOverlay("overlayPkg");
      });
    }

    function toast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 2200);
    }

    function openOverlay(id) { document.getElementById(id).classList.add("open"); }
    function closeOverlay(id) { document.getElementById(id).classList.remove("open"); }

    function renderHome() { renderMapPins(); }

    function switchTab(tab) {
      document.querySelectorAll(".tab-item").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
      document.querySelectorAll(".screen").forEach(s => s.classList.toggle("active", s.id === "screen-" + tab));
      const scr = document.getElementById("screen-" + tab);
      document.getElementById("pageTitle").textContent = scr.dataset.title;
      if (tab === "orders") renderOrders();
      if (tab === "mine") renderMine();
      if (tab === "home") renderMapPins();
    }

    function channelAttrForUser(u) {
      return u?.channelAttr || null;
    }

    function renderPkgOverlay() {
      const u = user();
      const isLeaseWl = u.entitlement === "设备租赁白名单" && u.whitelist;
      const attr = isLeaseWl ? null : channelAttrForUser(u);
      const seller = resolveSellerOperator(u);
      const body = document.getElementById("pkgSheetBody");
      const sellerBanner = isLeaseWl && CHANNELS[seller?.channelId]
        ? `<div class="service-scope-banner" style="margin-bottom:12px">收款方：<strong>${CHANNELS[seller.channelId].name}</strong> · 子商户 ${CHANNELS[seller.channelId].subMch}<br><small>仅白名单用户可购</small></div>`
        : (seller && OPERATORS[seller.operatorId]
          ? `<div class="service-scope-banner" style="margin-bottom:12px">收款方：<strong>${OPERATORS[seller.operatorId].name}</strong> · 子商户 ${OPERATORS[seller.operatorId].subMch}</div>`
          : "");
      const banner = attr ? `<div class="channel-attr-banner">🟡 <strong>${attr.channelName}</strong> 推广 · ${attr.expiresLabel} 内购套餐享渠道专享价<br><small>首触链接：${attr.linkPurpose}（${attr.linkCode}）</small></div>` : "";
      const skuSource = isLeaseWl ? LEASE_PKG_SKUS : CHANNEL_CARD_ATTR.skus;
      const cards = Object.values(skuSource).map(s => {
        const useChannel = !isLeaseWl && attr && s.channelSku;
        const price = isLeaseWl ? s.price : (useChannel ? s.channel : s.official);
        const priceHtml = useChannel
          ? `<div class="price-row"><span class="price-official">¥${s.official}</span><span class="price">¥${price}</span><span class="price-tag">渠道专享</span></div>`
          : `<div class="price-row"><span class="price">¥${price}</span>${attr ? `<span class="price-tag" style="background:#f5f5f5;color:var(--muted)">非渠道 SKU · 正式价</span>` : ""}</div>`;
        return `<div class="pkg-card${state.selectedPkg === s.key ? " selected" : ""}" data-pkg="${s.key}">
          <h4>${s.name}</h4>
          ${priceHtml}
          <div class="desc">${s.desc}</div>
        </div>`;
      }).join("");
      const kycBlock = u.loggedIn && !u.kyc
        ? `<p style="font-size:12px;color:#cf1322;margin:8px 0 0">请先完成实名认证后再购套餐</p>
           <button type="button" class="btn-block" id="btnGoKycFromPkg" style="margin-top:8px;background:#fff;color:var(--brand);border:1px solid var(--brand)">去实名认证</button>`
        : `<button type="button" class="btn-block" id="btnPayPkg" style="margin-top:8px">确认支付（Mock）</button>`;
      body.innerHTML = sellerBanner + banner + cards + kycBlock;
      body.querySelectorAll(".pkg-card").forEach(c => {
        c.onclick = () => {
          state.selectedPkg = c.dataset.pkg;
          renderPkgOverlay();
        };
      });
      const payBtn = document.getElementById("btnPayPkg");
      if (payBtn) payBtn.onclick = paySelectedPkg;
      const kycBtn = document.getElementById("btnGoKycFromPkg");
      if (kycBtn) kycBtn.onclick = () => { closeOverlay("overlayPkg"); openOverlay("overlayKyc"); };
    }

    function paySelectedPkg() {
      const u = user();
      if (!u.loggedIn) { toast("请先登录"); return; }
      if (!u.kyc) { toast("请先完成实名认证"); openOverlay("overlayKyc"); return; }
      const seller = resolveSellerOperator(u);
      if (!seller) { toast("无法确定收款方"); return; }
      const isLeaseWl = u.entitlement === "设备租赁白名单" && u.whitelist;
      const attr = channelAttrForUser(u);
      const skuSource = isLeaseWl ? LEASE_PKG_SKUS : CHANNEL_CARD_ATTR.skus;
      const sku = skuSource[state.selectedPkg] || skuSource.month;
      const useChannel = !isLeaseWl && attr && sku.channelSku;
      const amount = isLeaseWl ? sku.price : (useChannel ? sku.channel : sku.official);
      const id = "SUB" + Date.now().toString().slice(-8);
      const order = {
        id, pkg: sku.name + (useChannel ? "·渠道专享" : ""), amount,
        time: new Date().toLocaleString("zh-CN"), status: "已支付", userId: u.userId,
        contextSource: seller.source
      };
      if (isLeaseWl && CHANNELS[seller.channelId]) {
        const ch = CHANNELS[seller.channelId];
        order.sellerChannelId = ch.id;
        order.sellerChannelName = ch.name;
        order.subMch = ch.subMch;
      } else {
        const op = OPERATORS[seller.operatorId];
        order.sellerOperatorId = seller.operatorId;
        order.sellerOperatorName = op?.name;
        order.subMch = op?.subMch;
      }
      if (useChannel) {
        order.channel = attr.channelName;
        order.linkCode = attr.linkCode;
      }
      state.purchaseOrders.unshift(order);
      u.status = "服务中";
      if (isLeaseWl) {
        u.entitlement = "设备租赁白名单";
        u.pkg = sku.name;
        u.daysLeft = sku.days;
        u.swapUsed = u.swapUsed || 0;
      } else {
        u.entitlement = "个人套餐";
        u.pkg = sku.name;
        u.daysLeft = sku.days;
        u.swapUsed = 0;
        u.operator = seller.operatorId;
      }
      if (useChannel) {
        u.channelPurchase = attr.channelName;
        u.channelAttr = null;
      }
      closeOverlay("overlayPkg");
      const payee = isLeaseWl ? CHANNELS[seller.channelId]?.name : OPERATORS[seller.operatorId]?.name;
      toast("支付成功 · ¥" + amount + " → " + (payee || "—"));
      renderMine();
    }

      } else if (u.coolingPeriod) {

        card = `<div class="service-card warn"><div><h3>${u.pkg}</h3><p>剩余 ${u.daysLeft} 天 · 已换电 ${u.swapUsed} 次${batHint}</p><p style="font-size:11px;margin-top:6px;color:#7a6520">${coolLine}</p></div>${u.refundApplied ? "" : `<button type="button" class="btn-gold" data-action="cooling_refund">申请退款</button>`}</div>`;
      } else if (u.entitlement === "设备租赁白名单" && u.channelSuspended) {

        card = `<div class="service-card warn"><div><h3>渠道服务已暂停</h3><p>${u.channel}<br>渠道商已停用 · 不可取电/不出电${batHint}</p><p style="font-size:11px;margin-top:6px;color:#7a6520">扫码换电提示：当前站点已到期，请联系管理员续费</p></div></div>`;
      } else if (u.entitlement === "设备租赁白名单") {

        card = `<div class="service-card channel"><div><h3>设备租赁 · 白名单${isFree ? "免费" : "付费"}</h3><p>${u.channel}<br>${svcLine} · 已换电 ${u.swapUsed || 0} 次</p><p style="font-size:11px;margin-top:4px;opacity:.85">专属站：京东物流专属站${isFree ? "" : " · 款入渠道账户"}</p></div>${!isFree && u.status === "未开通" ? `<button type="button" class="btn-gold" data-action="buy">购买套餐</button>` : ""}</div>`;
      } else if (u.leaseBlocked) {
        card = `<div class="service-card warn"><div><h3>未授权用户</h3><p>${u.blockReason || "非白名单用户"}</p><p style="font-size:11px;margin-top:6px;color:#7a6520">非本渠道白名单，不可购买设备租赁套餐</p></div></div>`;
      } else if (u.entitlement === "渠道人天") {
        const quotaLine = u.remainingDays != null ? `剩余 ${u.remainingDays} 人天 · ` : "";
        const todayLine = u.todayEligibility === "已预占" ? "今日已预占（分配即开通）"
          : u.todayEligibility === "已确认消耗" || u.swapUsed > 0 ? `今日已确认消耗 · 换电 ${u.swapUsed} 次`
          : "今日资格待确认";
        card = `<div class="service-card channel"><div><h3>渠道人天额度</h3><p>${u.channel}${u.team ? " · " + u.team : ""}<br>${quotaLine}${todayLine}</p><p style="font-size:11px;margin-top:4px;opacity:.85">可在全网换电 · 额度售卖方 OP-SX</p></div></div>`;
      } else {
        const batHint = u.holdsBattery ? " · 持有电池" : "";
        const chHint = u.channelPurchase ? ` · ${u.channelPurchase}专享价购入` : "";
        card = `<div class="service-card"><div><h3>${u.pkg}</h3><p>剩余 ${u.daysLeft} 天 · 已换电 ${u.swapUsed} 次 · 服务中${batHint}${chHint}</p></div><button type="button" class="btn-gold" data-action="buy">续费</button></div>`;

      el.innerHTML = `
        <div class="profile-head">
          <div class="avatar">👤</div>

          <button type="button" class="settings-btn" id="btnSettings">⚙</button>
        </div>
        ${renderServiceScopeBanner()}
        ${card}
        <div class="section-card">
          <div class="section-title">常用功能</div>

            <button type="button" class="grid-item" data-action="scan"><span class="gi">⊞</span>扫码换电</button>

            <button type="button" class="grid-item" data-action="coupon"><span class="gi orange">🎫</span>我的优惠券</button>
            <button type="button" class="grid-item" data-action="service"><span class="gi">📞</span>客服电话</button>
            <button type="button" class="grid-item" data-action="return"><span class="gi">🔋</span>电池退还</button>

        document.getElementById("settingsRole").value = state.role;

      el.querySelectorAll("[data-action]").forEach(btn => {
        btn.onclick = () => handleAction(btn.dataset.action);

      el.querySelectorAll("[data-goto-orders]").forEach(btn => {
        btn.onclick = () => { state.orderTab = btn.dataset.gotoOrders; switchTab("orders"); };
      });

    function handleAction(action) {
      const u = user();
      if (action === "scan") { startScan(); return; }
      if (action === "fallback") { startScan(); return; }
      if (action === "buy") {
        if (u.loggedIn && !u.kyc && u.channelAttr) { openOverlay("overlayKyc"); return; }
        openPurchaseFlow();
        return;
      }
      if (action === "coupon") { toast("暂无可用优惠券"); return; }
      if (action === "service") { toast("客服 400-607-2666"); return; }
      if (action === "return") {
        if (!u.loggedIn || u.status === "未开通") { toast("请先开通服务"); return; }
        if (!u.holdsBattery) { toast("当前未持有电池"); return; }
        toast("电池已归还，可继续申请退押或冻结");
        if (u.holdsBattery) u.holdsBattery = false;
        renderMine();
        return;
      }
      if (action === "cooling_refund") {
        if (!u.loggedIn || u.entitlement !== "个人套餐") { toast("仅个人套餐用户可申请"); return; }
        if (!u.coolingPeriod) { toast("已超过 3 天冷静期，不可申请"); return; }
        if (u.holdsBattery) { toast("请先归还电池后再申请退款"); return; }
        if (u.refundApplied) { toast("已提交申请，等待运营商审核"); return; }
        u.refundApplied = true;
        toast("已提交冷静期退款（建议退套餐 ¥279 + 押金 ¥99），等待运营商审核");
        renderMine();
        return;
      }
      if (action === "freeze") {
        if (!u.loggedIn || u.status === "未开通") { toast("请先开通服务"); return; }
        if (u.entitlement !== "个人套餐") { toast("仅个人套餐用户可申请冻结"); return; }
        if (u.status === "已冻结") { toast("服务已冻结"); return; }
        if (u.status !== "服务中") { toast("仅服务中且套餐有效期内可申请"); return; }
        if (u.daysLeft != null && u.daysLeft <= 0) { toast("套餐已过期，无法冻结"); return; }
        if (u.holdsBattery) { toast("请先归还电池后再申请冻结"); return; }
        u.status = "已冻结";
        toast("服务已冻结，解冻后可继续换电");
        renderMine();
        return;
      }
      if (action === "kyc") { openOverlay("overlayKyc"); return; }
      if (action === "unfreeze") {
        if (u.entitlement !== "个人套餐") { toast("仅个人套餐用户可解除冻结"); return; }
        if (u.status !== "已冻结") { toast("当前未处于冻结状态"); return; }
        if (u.holdsBattery) { toast("请先归还电池后再解除冻结"); return; }
        const frozenDays = u.frozenDays || 1;
        u.status = "服务中";
        u.pendingPickup = true;
        if (u.daysLeft != null) u.daysLeft += frozenDays;
        toast("已解除冻结，有效期已顺延；请先扫码领取电池");
        renderMine();
        return;
      }
    }

    function renderOrders() {
      document.querySelectorAll(".sub-tab").forEach(t => t.classList.toggle("active", t.dataset.otab === state.orderTab));
      const u = user();
      const list = document.getElementById("orderList");
      let rows = [];
      if (state.orderTab === "swap") {
        rows = state.swapOrders.filter(o => !u.userId || o.userId === u.userId);
        if (!rows.length) {
          list.innerHTML = `<div class="empty"><div class="icon">🔋</div>暂无换电记录</div>`;
          return;
        }
        list.innerHTML = rows.map(o => `
          <div class="order-card">
            <div class="top"><span class="id">${o.id}</span><span class="status ${o.status === "失败" ? "fail" : ""}">${o.status}</span></div>
            <div class="meta">${o.site}<br>${o.time}<br>权益：${o.type}</div>
          </div>`).join("");
      } else if (state.orderTab === "purchase") {
        rows = state.purchaseOrders.filter(o => !u.userId || o.userId === u.userId);
        if (!rows.length) {
          list.innerHTML = `<div class="empty"><div class="icon">🛒</div>暂无购买记录</div>`;
          return;
        }
        list.innerHTML = rows.map(o => `<div class="order-card">
            <div class="top"><span class="id">${o.id}</span><span class="status">${o.status}</span></div>
            <div class="meta">${o.pkg} · ¥${o.amount}${o.sellerOperatorName ? "<br>服务：" + o.sellerOperatorName : ""}${o.channel ? "<br>渠道：" + o.channel + " · " + (o.linkCode || "") : ""}<br>${o.time}</div>
          </div>`).join("");
      } else {
        if (!state.returnOrders.length) {
          list.innerHTML = `<div class="empty"><div class="icon">📋</div>暂无退租记录</div>`;
          return;
        }
      }
    }

    const LEASE_SUSPEND_MSG = "当前站点已到期，请联系管理员续费";

    function isLeaseChannelSuspended(u) {
      return u.entitlement === "设备租赁白名单" && u.whitelist && u.channelSuspended === true;
    }

    function startScan() {
      const u = user();
      const site = SITES[state.scanSite];
      if (site) {
        state.session.scanCabinetOp = site.operator;
        if (!activePackageOperator(u)) setSessionOperator(site.operator, "scan", site.id, null);
      }
      if (!u.loggedIn) { toast("请先登录"); switchTab("mine"); return; }
      if (u.status === "未开通") {
        toast("请先购买套餐开通服务");
        if (!u.kyc) openOverlay("overlayKyc");
        else openPurchaseFlow();
        return;
      }
      if (u.status === "已冻结") { toast("服务已冻结，请先解除冻结"); return; }
      const pickupMode = u.pendingPickup && !u.holdsBattery;
      const suspended = isLeaseChannelSuspended(u);
      const body = document.getElementById("scanBody");
      body.innerHTML = `
        <div class="scan-box">
          <div class="scan-frame"><div class="scan-line"></div></div>
          <p style="color:var(--muted);font-size:13px">${pickupMode ? "对准换电柜二维码 · 领取电池" : "对准换电柜二维码"}</p>
          <p style="font-size:12px;margin-top:8px;color:var(--blue)">当前柜机：${site.name}</p>
          ${pickupMode ? `<p style="font-size:12px;margin-top:10px;color:var(--warn)">解冻后首次服务须<strong>领取电池</strong>（出电，非换电）</p>` : ""}
          ${suspended && u.holdsBattery ? `<p style="font-size:12px;margin-top:10px;color:var(--warn)">渠道已停用：可取<strong>还电</strong>，不可<strong>出电</strong></p>` : ""}
          ${pickupMode
            ? `<button type="button" class="btn-block" style="margin-top:20px" id="btnSimScan">模拟领取电池</button>`
            : suspended && u.holdsBattery
            ? `<button type="button" class="btn-block" style="margin-top:16px;background:var(--blue)" id="btnSimReturn">模拟还电入柜</button>
               <button type="button" class="btn-block" style="margin-top:8px;background:#fff;color:var(--danger);border:1px solid var(--danger)" id="btnSimScan">模拟扫码换电（不出电）</button>`
            : `<button type="button" class="btn-block" style="margin-top:20px" id="btnSimScan">模拟扫描成功</button>`}
        </div>`;
      body.querySelector("#btnSimScan").onclick = () => pickupMode ? runPickupBattery(site) : runSwap(site);
      if (suspended && u.holdsBattery) {
        body.querySelector("#btnSimReturn").onclick = () => runReturnBattery(site);
      }
      openOverlay("overlayScan");
    }

    function leaseWhitelistNeedsPkg(u) {
      return u.entitlement === "设备租赁白名单" && u.whitelist && u.whitelistAccess !== "free" && (u.status === "未开通" || !u.pkg);
    }

    function opPolicy(opId) {
      return OPERATOR_POLICY[opId] || { crossNetworkEnabled: true };
    }

    function channelSwapPolicy(chId) {
      return CHANNEL_SWAP_POLICY[chId] || { crossNetworkEnabled: false, crossNetworkDepositPaid: false };
    }

    function checkSwapGate(u, site) {
      if (site.channelDedicated && !canSeeDedicatedSite(u, site)) {
        return { ok: false, msg: "该站点为渠道专用站，仅白名单用户可见可用（E_WHITELIST）" };
      }
      const cabinetOp = site.operator;
      const isLeaseWl = u.entitlement === "设备租赁白名单" && u.whitelist && u.channelId;
      const hostOp = isLeaseWl ? (channelSwapPolicy(u.channelId).hostOperatorId || CHANNELS[u.channelId]?.operatorId || "OP-SX") : u.operator;
      const userOp = hostOp;
      const isCrossNetwork = userOp && cabinetOp && userOp !== cabinetOp;

      if (isCrossNetwork) {
        if (isLeaseWl) {
          const chPol = channelSwapPolicy(u.channelId);
          if (!chPol.crossNetworkEnabled) {
            return { ok: false, msg: "您的渠道未开通跨网换电，仅可在本网站点换电" };
          }
          if (!chPol.crossNetworkDepositPaid) {
            return { ok: false, msg: "渠道跨网保证金未缴纳，跨网换电不可用（E_CHANNEL_CROSSNET_DEPOSIT）" };
          }
          if (chPol.crossSwapEnabled === false) {
            return { ok: false, msg: "渠道信用额度不足，跨网换电已关闭" };
          }
        } else {
          const userCredit = OPERATOR_CREDIT[userOp];
          if (userCredit && userCredit.crossSwapEnabled === false) {
            return { ok: false, msg: "您的运营商信用额度不足，跨网换电已关闭" };
          }
          const userPol = opPolicy(userOp);
          if (!userPol.crossNetworkEnabled) {
            return { ok: false, msg: "您的运营商已关闭跨网换电，仅可在本运营商站点换电" };
          }
        }
        const cabPol = opPolicy(cabinetOp);
        if (!cabPol.crossNetworkEnabled) {
          return { ok: false, msg: "该站点运营商已关闭跨网换电，外来用户不可换电" };
        }
      }

      return { ok: true };
    }

    function runPickupBattery(site) {
      const u = user();
      const gate = checkSwapGate(u, site);
      if (!gate.ok) {
        showScanResult(false, gate.msg, site);
        return;
      }
      const batSn = "BAT-SH-" + Date.now().toString().slice(-4);
      u.holdsBattery = true;
      u.pendingPickup = false;
      u.currentBatterySn = batSn;
      const id = "SW" + Date.now().toString().slice(-8);
      state.swapOrders.unshift({
        id, site: site.name, time: new Date().toLocaleString("zh-CN"), status: "成功",
        type: "个人套餐 · 领取电池", userId: u.userId
      });
      document.getElementById("scanBody").innerHTML = `
        <div class="result-ok">
          <div class="big">✓</div>
          <h3 style="margin-bottom:8px">领取电池成功</h3>
          <p style="font-size:13px;color:var(--muted);line-height:1.7">
            单号 ${id}<br>${site.name}<br>已领取 ${batSn} · 格口已关闭<br>
            <small>解冻后首次服务已完成，后续可正常换电</small>
          </p>
          <button type="button" class="btn-block" style="margin-top:20px" data-close-scan>完成</button>
        </div>`;
      document.getElementById("scanBody").querySelector("[data-close-scan]").onclick = () => {
        closeOverlay("overlayScan");
        renderMine();
        renderHome();
      };
    }

    function runSwap(site) {
      const u = user();
      if (u.pendingPickup && !u.holdsBattery) {
        runPickupBattery(site);
        return;
      }
      if (u.leaseBlocked) {
        showScanResult(false, u.blockReason || "非授权用户，请联系渠道管理员", site);
        return;
      }
      if (isLeaseChannelSuspended(u)) {
        showScanResult(false, LEASE_SUSPEND_MSG + "（E_LEASE_CHANNEL_SUSPENDED）", site);
        return;
      }
      if (leaseWhitelistNeedsPkg(u)) {
        showScanResult(false, "白名单付费用户须购买白名单套餐后方可换电（E_LEASE_PKG_REQUIRED）", site);
        return;
      }
      if (u.preOccupyFail) {
        showPreOccupyFailResult(site, u.failReason || "渠道人天今日不可用");
        return;
      }
      const gate = checkSwapGate(u, site);
      if (!gate.ok) {
        showScanResult(false, gate.msg, site);
        return;
      }
      const userOp = (u.entitlement === "设备租赁白名单" && u.channelId)
        ? (channelSwapPolicy(u.channelId).hostOperatorId || CHANNELS[u.channelId]?.operatorId || "OP-SX")
        : (u.operator || "OP-SX");
      const cabOp = site.operator;
      const batOp = site.batteryOperator || site.operator;
      const cabFee = userOp !== cabOp ? 0.5 : 0;
      const batFee = userOp !== batOp ? 0.1 : 0;
      const id = "SW" + Date.now().toString().slice(-8);
      state.swapOrders.unshift({
        id, site: site.name, time: new Date().toLocaleString("zh-CN"), status: "成功",
        type: u.entitlement || "个人套餐", userId: u.userId,
        userOwner: u.channelId || userOp, cabinetOwner: cabOp, batteryOwner: batOp, l1Fee: cabFee + batFee
      });
      if (u.entitlement === "渠道人天") u.swapUsed = (u.swapUsed || 0) + 1;
      else if (u.entitlement === "设备租赁白名单") u.swapUsed = (u.swapUsed || 0) + 1;
      else u.swapUsed = (u.swapUsed || 0) + 1;
      showScanResult(true, "换电成功", site, id, { userOp, cabOp, batOp, l1Fee: cabFee + batFee });
    }

    function runReturnBattery(site) {
      const u = user();
      if (!isLeaseChannelSuspended(u) || !u.holdsBattery) {
        showScanResult(false, "当前无法还电", site);
        return;
      }
      const id = "RT" + Date.now().toString().slice(-8);
      const batSn = u.currentBatterySn || "BAT-JD-050";
      u.holdsBattery = false;
      u.currentBatterySn = null;
      state.returnOrders.unshift({
        id, site: site.name, battery: batSn, time: new Date().toLocaleString("zh-CN"),
        status: "已归还", userId: u.userId, note: "渠道停服期间还电入柜"
      });
      showReturnResult(site, id, batSn);
    }

    function showReturnResult(site, returnId, batSn) {
      document.getElementById("scanBody").innerHTML = `
        <div class="result-ok">
          <div class="big">✓</div>
          <h3 style="margin-bottom:8px">还电成功</h3>
          <p style="font-size:13px;color:var(--muted);line-height:1.7">
            单号 ${returnId}<br>${site.name}<br>已归还 ${batSn} · 格口已关闭<br>
            <small>渠道停服期间仅支持还电，暂不可取新电池</small>
          </p>
          <button type="button" class="btn-block" style="margin-top:20px" data-close-scan>完成</button>
        </div>`;
      document.getElementById("scanBody").querySelector("[data-close-scan]").onclick = () => {
        closeOverlay("overlayScan");
        renderHome();
      };
    }

    function payFallbackAndSwap(site, sku) {
      const u = user();
      const pkgMap = { day1: { pkg: "1天畅换", amount: 29 }, single: { pkg: "单次换电", amount: 9.9 } };
      const sel = pkgMap[sku] || pkgMap.day1;
      const payId = "PAY-POOL-" + Date.now().toString().slice(-6);
      state.purchaseOrders.unshift({
        id: payId, pkg: sel.pkg + "·渠道兜底", amount: sel.amount,
        time: new Date().toLocaleString("zh-CN"), status: "已支付", userId: u.userId
      });
      u.fallbackPaid = true;
      u.fallbackSku = sel.pkg;
      const gate = checkSwapGate(u, site);
      if (!gate.ok) {
        showScanResult(false, gate.msg, site);
        return;
      }
      const userOp = u.operator || "OP-SX";
      const cabOp = site.operator;
      const batOp = site.batteryOperator || site.operator;
      const cabFee = userOp !== cabOp ? 0.5 : 0;
      const batFee = userOp !== batOp ? 0.1 : 0;
      const id = "SW" + Date.now().toString().slice(-8);
      state.swapOrders.unshift({
        id, site: site.name, time: new Date().toLocaleString("zh-CN"), status: "成功",
        type: "渠道兜底自费", userId: u.userId,
        userOwner: userOp, cabinetOwner: cabOp, batteryOwner: batOp, l1Fee: cabFee + batFee
      });
      u.swapUsed = (u.swapUsed || 0) + 1;
      showScanResult(true, "换电成功（自费兜底）", site, id, { userOp, cabOp, batOp, l1Fee: cabFee + batFee });
    }

    function showPreOccupyFailResult(site, reason) {
      document.getElementById("scanBody").innerHTML = `
        <div class="result-ok">
          <div class="big" style="color:var(--danger)">!</div>
          <h3 style="margin-bottom:8px">渠道人天不可用</h3>
          <p style="font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:16px">${reason}<br><small>今日未预占成功，无法消耗渠道额度池</small></p>
          <p style="font-size:12px;color:var(--blue);margin-bottom:12px">可选运营商兜底 SKU（购后 24h 有效）：</p>
          <button type="button" class="btn-block" data-fallback="day1" style="margin-bottom:8px">1天畅换 · ¥29</button>
          <button type="button" class="btn-block" data-fallback="single" style="margin-bottom:8px;background:#fff;color:var(--blue);border:1px solid var(--blue)">单次换电 · ¥9.9</button>
          <button type="button" class="btn-block" style="margin-top:8px;background:var(--bg);color:var(--muted)" data-close-scan>取消</button>
        </div>`;
      document.getElementById("scanBody").querySelectorAll("[data-fallback]").forEach(btn => {
        btn.onclick = () => payFallbackAndSwap(site, btn.dataset.fallback);
      });
      document.getElementById("scanBody").querySelector("[data-close-scan]").onclick = () => closeOverlay("overlayScan");
    }

    function showScanResult(ok, msg, site, swapId, triplet) {
      const l1Line = triplet && triplet.l1Fee > 0
        ? `<br>跨网设备服务费 ¥${triplet.l1Fee.toFixed(2)}（U→C/B 平台代付）`
        : triplet ? `<br>跨网设备服务费：无（运营商归属相同）` : "";
      const tripletLine = triplet
        ? `<br><small>用户运营商 ${triplet.userOp} · 柜机 ${triplet.cabOp} · 电池 ${triplet.batOp}</small>`
        : "";
      document.getElementById("scanBody").innerHTML = ok ? `
        <div class="result-ok">
          <div class="big">✓</div>
          <h3 style="margin-bottom:8px">${msg}</h3>
          <p style="font-size:13px;color:var(--muted);line-height:1.7">
            单号 ${swapId}<br>${site.name}<br>换出电池 SOC 96% · 健康正常${tripletLine}${l1Line}
          </p>
          <button type="button" class="btn-block" style="margin-top:20px" data-close-scan>完成</button>
        </div>` : `
        <div class="result-ok">
          <div class="big" style="color:var(--danger)">✕</div>
          <h3 style="margin-bottom:8px">换电失败</h3>
          <p style="font-size:13px;color:var(--muted)">${msg}</p>
          <button type="button" class="btn-block" style="margin-top:20px" data-close-scan>知道了</button>
        </div>`;
      document.getElementById("scanBody").querySelector("[data-close-scan]").onclick = () => closeOverlay("overlayScan");
    }

    document.querySelectorAll(".tab-item").forEach(b => b.onclick = () => switchTab(b.dataset.tab));
    document.getElementById("btnScan").onclick = startScan;
    document.getElementById("btnHelp").onclick = () => toast("帮助中心建设中");
    document.getElementById("btnLocate").onclick = () => {
      const geo = geoResolve();
      if (geo.blocked) {
        toast(geo.reason === "denied" ? "演示：用户拒绝定位" : "演示：附近无在营站");
        return;
      }
      if (geo.needPick) {
        openOperatorPicker(geo.candidates, () => toast("请点「服务购买」继续"));
        return;
      }
      if (geo.auto) {
        setSessionOperator(geo.operatorId, "geo_auto", geo.nearestSiteId, geo.distanceM);
        renderMine();
        toast("已匹配 " + OPERATORS[geo.operatorId].name + " · 最近 " + SITES[geo.nearestSiteId].name);
      }
    };
    document.querySelectorAll(".map-pin").forEach(p => {
      p.onclick = () => {
        state.scanSite = p.dataset.site;
        document.getElementById("demoSite").value = state.scanSite;
        const s = SITES[state.scanSite];
        if (s) state.session.scanCabinetOp = s.operator;
        toast("已选站点：" + s.name);
      };
    });

    document.querySelectorAll(".sub-tab").forEach(t => {
      t.onclick = () => { state.orderTab = t.dataset.otab; renderOrders(); };
    });

    document.querySelectorAll("[data-close]").forEach(b => {
      b.onclick = () => closeOverlay(b.dataset.close);
    });
    document.querySelectorAll(".overlay").forEach(ov => {
      ov.onclick = e => { if (e.target === ov) ov.classList.remove("open"); };
    });

    document.getElementById("btnKycSubmit").onclick = () => {
      const name = document.getElementById("kycName").value.trim();
      const id = document.getElementById("kycId").value.trim();
      if (!name || id.length < 15) { toast("请填写正确的身份信息"); return; }
      const u = user();
      u.kyc = true;
      if (state.role === "card_link_kyc") {
        state.role = "card_link_attr";
        document.getElementById("demoRole").value = "card_link_attr";
      }
      closeOverlay("overlayKyc");
      toast("实名认证成功，可享渠道专享价购套餐");
      renderMine();
    };

    document.getElementById("btnLogout").onclick = () => {
      state.role = "guest";
      document.getElementById("demoRole").value = "guest";
      closeOverlay("overlaySettings");
      renderMine();
      toast("已退出登录");
    };
    document.getElementById("settingsRole").onchange = function() {
      state.role = this.value;
      document.getElementById("demoRole").value = this.value;
      closeOverlay("overlaySettings");
      renderMine();
      renderOrders();
      renderMapPins();
    };

    document.getElementById("applyDemo").onclick = () => {
      state.role = document.getElementById("demoRole").value;
      state.scanSite = state.role === "personal_cross3" ? "ST-BJ-01" : document.getElementById("demoSite").value;
      if (state.role === "personal_cross3") document.getElementById("demoSite").value = "ST-BJ-01";
      state.geoScenario = document.getElementById("demoGeo").value;
      if (state.role === "geo_ambiguous") state.geoScenario = "ambiguous";
      resetSessionContext();
      if (state.role === "card_link_guest" || state.role === "card_link_kyc" || state.role === "card_link_attr") {
        setSessionOperator("OP-SX", "launch");
      }
      OPERATOR_POLICY["OP-SX"].crossNetworkEnabled = document.getElementById("policyCrossNet").checked;
      renderMine();
      renderOrders();
      renderMapPins();
      toast("已切换演示身份 · 定位场景：" + document.getElementById("demoGeo").selectedOptions[0].text);
    };

    switchTab("home");
    renderMine();
    renderMapPins();

    (function () {
      var link = document.getElementById("navDocsLink");
      if (link && !/\/prototype(\/|$)/.test(location.pathname)) {
        link.href = "../documentation/index.html";
      }
    })();
  </script>
</body>
</html>
