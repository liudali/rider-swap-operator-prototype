<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>骑手换电 · 代理商/运营商/租赁公司后台</title>
  <style>
    :root {
      --bg: #f4f7fb; --surface: #fff; --surface-soft: #f7fafc; --ink: #17212b; --muted: #657383;
      --line: #dce5ee; --brand: #0d9488; --brand-dark: #0f766e; --brand-soft: #ecfdf5;
      --green: #1f8f85; --red: #c84545; --radius: 8px; --shadow: 0 10px 30px rgba(22, 33, 43, .08);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; color: var(--ink); background: var(--bg); }
    button, select, input { font: inherit; }
    button { cursor: pointer; }
    .app { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
    .sidebar { background: #1a2332; color: #e8eef4; padding: 20px 14px; }
    .brand strong { display: block; font-size: 16px; }
    .brand span, .tenant { font-size: 12px; color: #9aa8b8; line-height: 1.5; margin-top: 6px; display: block; }
    .tenant { margin-top: 12px; padding: 8px 10px; background: rgba(255,255,255,.06); border-radius: var(--radius); color: #dce5ee; }
    .tenant em { display: block; font-style: normal; color: #fff; font-size: 13px; margin-top: 4px; }
    .nav { display: grid; gap: 6px; margin-top: 20px; }
    .nav button {
      border: none; background: transparent; color: #c5d0dc; text-align: left;
      padding: 10px 12px; border-radius: var(--radius);
    }
    .nav button.active { background: rgba(13, 148, 136, .25); color: #fff; }
    .main { padding: 16px 18px 24px; min-width: 0; }
    .topbar { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
    .topbar h1 { margin: 0; font-size: 22px; }
    .topbar p { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
    .filters {
      display: none; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 10px;
      padding: 12px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
      margin-bottom: 14px; box-shadow: var(--shadow);
    }
    .filters.visible { display: grid; }
    .field { display: grid; gap: 6px; min-width: 0; }
    .field label { font-size: 12px; color: var(--muted); }
    .field select, .field input {
      height: 36px; border: 1px solid var(--line); border-radius: var(--radius);
      padding: 0 10px; background: #fff; width: 100%; min-width: 0;
    }
    .scope-hint {
      font-size: 12px; color: var(--muted); margin-bottom: 14px; padding: 10px 12px;
      background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    }
    .kpi-grid { display: grid; grid-template-columns: repeat(4, minmax(130px, 1fr)); gap: 12px; margin-bottom: 14px; }
    .kpi { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); }
    .kpi-head { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--muted); }
    .kpi-head-actions { display: inline-flex; align-items: center; gap: 8px; }
    .kpi-icon { width: 28px; height: 28px; border-radius: 7px; background: var(--brand-soft); color: var(--brand); display: grid; place-items: center; font-size: 12px; font-weight: 700; }
    .kpi-value { font-size: 24px; font-weight: 700; margin-top: 8px; }
    .kpi-sub { font-size: 12px; color: var(--muted); margin-top: 8px; }
    .module-note { border: none; background: #ffecec; color: var(--red); font-size: 12px; font-weight: 700; padding: 4px 8px; border-radius: 999px; }
    .panel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 14px; }
    .panel-head { padding: 14px 16px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
    .panel-head h2 { margin: 0; font-size: 16px; }
    .panel-head span { display: block; margin-top: 4px; font-size: 12px; color: var(--muted); }
    .panel-body { padding: 16px; overflow-x: auto; }
    .view { display: none; }
    .view.active { display: block; }
    .tabs { display: flex; gap: 8px; }
    .tabs button { height: 32px; padding: 0 12px; border: 1px solid var(--line); border-radius: var(--radius); background: #fff; color: var(--muted); }
    .tabs button.active { background: var(--brand-soft); border-color: var(--brand); color: var(--brand-dark); font-weight: 600; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 640px; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--line); text-align: left; white-space: nowrap; }
    th { color: var(--muted); font-weight: 600; background: var(--surface-soft); }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; background: #eaf6ef; color: var(--green); }
    .tag.warn { background: #fff4df; color: #b8860b; }
    .tag.risk { background: #ffecec; color: var(--red); }
    .tag.neutral { background: #eef2f6; color: var(--muted); }
    .note-mask { position: fixed; inset: 0; background: rgba(15,23,42,.42); z-index: 40; display: none; }
    .note-mask.open { display: block; }
    .note-modal {
      position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: min(520px, calc(100vw - 32px)); background: var(--surface); border-radius: var(--radius);
      box-shadow: var(--shadow); z-index: 41; display: none;
    }
    .note-modal.open { display: block; }
    .note-head { padding: 14px 16px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
    .note-head h3 { margin: 0; font-size: 16px; }
    .note-body { padding: 16px; font-size: 14px; line-height: 1.7; }
    .btn { height: 34px; padding: 0 14px; border: 1px solid var(--line); border-radius: var(--radius); background: #fff; }
    .btn.primary { background: var(--brand); border-color: var(--brand); color: #fff; }
    .link-btn { border: none; background: none; color: var(--brand); padding: 0; font-size: 13px; text-decoration: underline; cursor: pointer; }
    .drawer-mask { position: fixed; inset: 0; background: rgba(15,23,42,.38); z-index: 50; display: none; }
    .drawer-mask.open { display: block; }
    .drawer {
      position: fixed; top: 0; right: 0; width: min(520px, 100vw); height: 100vh;
      background: var(--surface); box-shadow: -8px 0 32px rgba(0,0,0,.12); z-index: 51;
      transform: translateX(100%); transition: transform .22s ease; display: grid; grid-template-rows: auto 1fr;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-head { padding: 16px 18px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .drawer-head h3 { margin: 0; font-size: 17px; }
    .drawer-head p { margin: 6px 0 0; font-size: 12px; color: var(--muted); }
    .drawer-body { padding: 16px 18px 24px; overflow-y: auto; }
    .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
    .detail-item { background: var(--surface-soft); border: 1px solid var(--line); border-radius: var(--radius); padding: 10px 12px; font-size: 12px; }
    .detail-item span { display: block; color: var(--muted); margin-bottom: 4px; }
    .detail-item strong { font-size: 14px; }
    .usage-bar { height: 8px; background: #eef2f6; border-radius: 999px; overflow: hidden; margin: 8px 0 4px; }
    .usage-bar i { display: block; height: 100%; background: var(--brand); border-radius: 999px; }
    .sub-table { margin-top: 8px; }
    .sub-table th { font-size: 12px; }
    .role-select { width: 100%; margin-top: 8px; height: 32px; border-radius: var(--radius); border: 1px solid rgba(255,255,255,.15); background: #243044; color: #fff; padding: 0 8px; }
    .tree-hint { font-size: 11px; color: #9aa8b8; margin-top: 10px; line-height: 1.5; }
    .perm-banner {
      font-size: 12px; color: var(--brand-dark); background: var(--brand-soft); border: 1px solid #99f6e4;
      border-radius: var(--radius); padding: 10px 12px; margin-bottom: 14px; line-height: 1.6;
    }
    .nav button.nav-sub-profit,
    .nav button.nav-partner-profit { border: 1px solid rgba(45, 212, 191, .45); }
    .nav button.nav-sub-profit.active,
    .nav button.nav-partner-profit.active { border-color: #5eead4; box-shadow: inset 0 0 0 1px #5eead4; }
    .sub-profit-hero {
      background: linear-gradient(135deg, #ecfdf5 0%, #f0fdfa 100%);
      border: 2px solid var(--brand); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 14px;
    }
    .sub-profit-hero h2 { margin: 0 0 6px; font-size: 18px; color: var(--brand-dark); }
    .sub-profit-hero p { margin: 0; font-size: 13px; color: var(--muted); line-height: 1.6; }
    .own-scope-banner {
      font-size: 12px; color: #334155; background: #f1f5f9; border: 1px solid var(--line);
      border-radius: var(--radius); padding: 10px 12px; margin-bottom: 14px; line-height: 1.6;
    }
    .privacy-banner {
      font-size: 12px; color: #7c2d12; background: #fff7ed; border: 1px solid #fdba74;
      border-radius: var(--radius); padding: 10px 12px; margin-bottom: 12px; line-height: 1.6;
    }
    .panel-sub-orders .panel-head { background: linear-gradient(90deg, #ecfdf5, #fff); }
    .orders-table-wrap { overflow-x: auto; }
    .site-stats-table .site-stats-total td {
      background: var(--surface-soft); font-weight: 600; border-top: 2px solid var(--line);
    }
    .device-chips { display: flex; flex-wrap: wrap; gap: 4px; max-width: 220px; white-space: normal; }
    .device-chip {
      display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
      background: var(--surface-soft); border: 1px solid var(--line); color: var(--ink);
    }
    .rent-gap-banner {
      font-size: 13px; color: #7c2d12; background: #fff7ed; border: 1px solid #fdba74;
      border-radius: var(--radius); padding: 12px 14px; margin-bottom: 14px; line-height: 1.6;
    }
    .rent-gap-banner strong { color: #c2410c; }
    .pay-mode { font-size: 12px; color: var(--muted); }
    .swap-log { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); }
    .swap-log summary { cursor: pointer; font-size: 13px; font-weight: 600; color: var(--brand-dark); list-style: none; }
    .swap-log summary::-webkit-details-marker { display: none; }
    .log-timeline { margin-top: 10px; display: grid; gap: 6px; max-height: 280px; overflow-y: auto; }
    .log-item {
      display: grid; grid-template-columns: 58px 76px 1fr; gap: 8px; align-items: start;
      font-size: 12px; line-height: 1.5; padding: 8px 10px; background: #fafbfc;
      border-radius: 6px; border-left: 3px solid var(--line);
    }
    .log-item.user { border-left-color: #3b82f6; }
    .log-item.req { border-left-color: #8b5cf6; }
    .log-item.dev { border-left-color: var(--brand); }
    .log-item.warn { border-left-color: #f59e0b; background: #fffbeb; }
    .log-item.fail { border-left-color: var(--red); background: #fff5f5; }
    .log-item .log-type { font-size: 11px; color: var(--muted); font-weight: 600; }
    .log-item .log-time { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
    .form-grid { display: grid; gap: 12px; }
    .form-grid label { display: grid; gap: 6px; font-size: 12px; color: var(--muted); }
    .form-grid input, .form-grid select { height: 36px; border: 1px solid var(--line); border-radius: var(--radius); padding: 0 10px; }
    .form-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
    .row-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    @media (max-width: 1100px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <strong>骑手换电</strong>
        <span>代理商 · 运营商 · 租赁公司</span>
      </div>
      <div class="tenant">
        当前主体<em id="tenantName">闪送驿站联营</em>
        <span id="tenantType">运营商</span>
        <select class="role-select" id="loginSelect" aria-label="切换登录身份"></select>
        <p class="tree-hint" id="treeHint">上级：浦东二级代理 → 华东一级代理</p>
      </div>
      <nav class="nav" id="nav"></nav>
    </aside>
    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">总览</h1>
          <p id="pageDesc">己方站点经营核心指标。</p>
        </div>
        <button class="btn primary" type="button" id="resetBtn">重置筛选</button>
      </header>
      <section class="filters" id="pageFilters" aria-label="页面筛选"></section>
      <p class="scope-hint" id="scopeHint">数据范围：当前登录运营商名下全部授权站点（演示数据）。</p>
      <div id="views"></div>
    </main>
  </div>
  <div class="drawer-mask" id="drawerMask"></div>
  <aside class="drawer" id="orderDrawer" aria-hidden="true">
    <div class="drawer-head">
      <div>
        <h3 id="drawerTitle">套餐订单详情</h3>
        <p id="drawerSub"></p>
      </div>
      <button class="btn" type="button" id="closeDrawer">关闭</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
  </aside>
  <div class="note-mask" id="employeeMask"></div>
  <div class="note-modal" id="employeeModal" role="dialog" aria-modal="true">
    <div class="note-head">
      <h3 id="employeeFormTitle">员工</h3>
      <button class="btn" type="button" id="closeEmployeeForm">关闭</button>
    </div>
    <div class="note-body">
      <form id="employeeForm" class="form-grid"></form>
      <div class="form-actions">
        <button class="btn" type="button" id="cancelEmployeeForm">取消</button>
        <button class="btn primary" type="button" id="saveEmployeeForm">保存</button>
      </div>
    </div>
  </div>
  <div class="note-mask" id="orgMask"></div>
  <div class="note-modal" id="orgModal" role="dialog" aria-modal="true">
    <div class="note-head">
      <h3 id="orgFormTitle">组织</h3>
      <button class="btn" type="button" id="closeOrgForm">关闭</button>
    </div>
    <div class="note-body">
      <form id="orgForm" class="form-grid"></form>
      <div class="form-actions">
        <button class="btn" type="button" id="cancelOrgForm">取消</button>
        <button class="btn primary" type="button" id="saveOrgForm">保存</button>
      </div>
    </div>
  </div>
  <div class="note-mask" id="noteMask"></div>
  <div class="note-modal" id="noteModal" role="dialog" aria-modal="true">
    <div class="note-head">
      <h3 id="noteTitle">模块说明</h3>
      <button class="btn" type="button" id="closeNote">关闭</button>
    </div>
    <div class="note-body" id="noteBody"></div>
  </div>
  <script>
    const PLATFORM_OPS_SHARE = 0;
    const PAY_ARCH = "B";
    const PAYEE_OPERATOR = "闪送驿站联营";
    const PAYEE_MCH = { wx: "1900000123***", ali: "2088123456***" };
    const ENT = {
      l1: { id: "L1-HD", name: "华东一级代理" },
      l2: { id: "L2-PD", name: "浦东二级代理" },
      operator: { id: "OP-SX", name: PAYEE_OPERATOR },
      leasing: { id: "LEASE-HD", name: "华东设备租赁公司" }
    };
    const ROLE = {
      l1: { name: ENT.l1.name, type: "一级代理商", tree: "自有 + 租赁设备 · 收款账户 · 下级分润" },
      l2: { name: ENT.l2.name, type: "二级代理商", tree: "含租赁设备还款 · 收款账户 · 下级分润" },
      operator: { name: ENT.operator.name, type: "合作运营商", tree: "架构B · 含租赁柜机 · 收款账户" },
      leasing: { name: ENT.leasing.name, type: "租赁公司", tree: "出租设备 · 协议与承租方还款" }
    };
    const NAV = {
      l1: ["overview", "org", "employees", "devices", "leaseAgreements", "leaseRent", "orders", "flows", "subProfit", "accounts"],
      l2: ["overview", "org", "employees", "devices", "leaseAgreements", "leaseRent", "orders", "flows", "subProfit", "accounts"],
      operator: ["overview", "sites", "devices", "leaseAgreements", "leaseRent", "orders", "flows", "employees", "users", "partnerProfit", "accounts"],
      leasing: ["overview", "employees", "leaseAgreements", "leaseCollect", "accounts"]
    };
    const NAV_LABEL = {
      overview: "总览", org: "组织管理", employees: "员工", sites: "站点", devices: "我的设备",
      orders: "我的订单", flows: "我的流水", users: "用户", subProfit: "下级分润", partnerProfit: "合作伙伴分润",
      leaseAgreements: "协议与设备", leaseCollect: "租金收缴", leaseRent: "月租金",
      accounts: "收款账户", partnerAccount: "个人账户"
    };

    const ENTITY_ROLE = { "L1-HD": "l1", "L2-PD": "l2", "OP-SX": "operator", "LEASE-HD": "leasing" };

    const PERM_VIEW_MAP = {
      "overview.view": ["overview"],
      "sites.view": ["sites"], "sites.edit": ["sites"],
      "devices.view": ["devices"], "devices.edit": ["devices"],
      "orders.view": ["orders"], "orders.audit": ["orders"],
      "flows.view": ["flows"],
      "users.view": ["users"],
      "employees.view": ["employees"], "employees.edit": ["employees"],
      "partner_profit.view": ["partnerProfit"],
      "partner_profit.settle": ["partnerProfit"],
      "partner_account.view": ["partnerAccount"],
      "partner_account.withdraw": ["partnerAccount"],
      "lease.view": ["leaseAgreements", "leaseRent"],
      "lease.rent": ["leaseRent"],
      "accounts.view": ["accounts"],
      "org.view": ["org"],
      "sub_profit.view": ["subProfit"],
      "lease_collect.view": ["leaseCollect"]
    };

    const PARTNER_DEFAULT_PERMS = ["partner_account.view", "partner_account.withdraw", "partner_profit.view"];

    const meta = {
      overview: ["总览", "自有 KPI + 按站点经营分析（用户数、换电数、订单总金额）；下级分润见独立菜单。"],
      org: ["组织管理", "按角色维护下级；一级不可管理二级的直属合作运营商。"],

      devices: ["我的设备", "仅展示与维护本人（本主体）拥有的换电柜、电池。"],

      flows: ["我的流水", "仅关联本人设备订单的资金实收、应分台账、分账批次。"],

      employees: ["员工", "运营员工与合作伙伴统一维护；员工可配置功能权限，合作伙伴供分润模块选用。"],
      partnerProfit: ["合作伙伴分润", "分润设置从「员工」中的合作伙伴选取；查看关联站点订单明细（不脱敏）。"],
      partnerAccount: ["个人账户", "合作伙伴查看分润余额、绑定银行卡、发起提现及提现记录。"],
      users: ["用户", "购买本站换电服务的骑手。"],

      leaseRent: ["月租金", "按月查看设备租金、站点收入覆盖情况；支持自动扣款或手动缴纳。"],
      accounts: ["收款账户管理", "本主体进件商户：骑手收款、分账、租金收付等用途。"]
    };

    const MODULE_NOTES = {
      scope: { title: "数据范围", content: "除品牌方外，一级代理、二级代理、合作运营商均可持有自有设备；各主体仅管理自有设备、仅查看自有设备产生的订单与流水。一级不可管理二级名下的合作运营商。" },
      org_scope: { title: "管理权限", content: "一级可新增/编辑二级代理、直属合作运营商；不可管理二级名下的合作运营商。二级仅可新增/编辑直属合作运营商。" },
      asset_owner: { title: "设备归属", content: "柜机/电池归属主体（一级代理、二级代理或合作运营商）。后台仅展示与操作当前登录主体名下设备；订单按设备归属过滤。" },

    function maskUserId(id) {
      if (!id) return "—";
      const s = String(id);
      if (s.length <= 4) return s.charAt(0) + "***";
      return s.slice(0, 2) + "***" + s.slice(-2);
    }

    function maskPhone(phone) {
      if (!phone) return "—";
      const digits = String(phone).replace(/\D/g, "");
      if (digits.length >= 11) return digits.slice(0, 3) + "****" + digits.slice(-4);
      if (phone.includes("*")) return phone;
      return "***";
    }

    function subProfitOrderLines() {
      const f = getPf();
      return subProfitOrders.filter(o => {
        if (o.viewer !== state.role) return false;
        if (f.subId !== "全部" && o.subId !== f.subId) return false;
        if (!matchKw(o.orderId, f.orderId)) return false;
        if (f.payout !== "全部" && o.payout !== f.payout) return false;
        return true;
      });
    }

    function myEmployees() {
      return employeeStore[currentEntity().id] || [];
    }

    function myStaff() {
      return myEmployees().filter(e => e.roleType === "staff");
    }

    function myPartners() {
      return myEmployees().filter(e => e.roleType === "partner");
    }

    function employeeById(id) {
      return myEmployees().find(e => e.id === id);
    }

    function partnerById(id) {
      return myPartners().find(p => p.id === id);
    }

    function partnerLabelForSite(siteName) {
      const s = sites.find(x => x.name === siteName);
      if (!s || !s.partnerId) return "—";
      const p = partnerById(s.partnerId);
      return p ? `<strong>${p.name}</strong><br><small style="color:var(--muted)">${p.id}</small>` : s.partnerId;
    }

    function ownSiteNameList() {
      return [...new Set(cabinets.filter(c => c.deviceOwnerId === currentEntity().id).map(c => c.site))];
    }

    function syncPartnerSiteNames() {
      myPartners().forEach(p => {
        p.siteNames = sites.filter(s => s.partnerId === p.id && s.operatorId === currentEntity().id).map(s => s.name);
      });
    }

    function syncSitesFromPartnerEmployees() {
      const eid = currentEntity().id;
      const names = ownSiteNameList();
      names.forEach(siteName => {
        const site = sites.find(s => s.name === siteName);
        if (!site) return;
        if (!site.operatorId) site.operatorId = eid;
        const partner = myPartners().find(p => (p.siteNames || []).includes(siteName));
        if (partner) site.partnerId = partner.id;
        else delete site.partnerId;
      });
      syncPartnerSiteNames();
    }

    function assignSitePartner(siteName, partnerId) {
      const site = sites.find(s => s.name === siteName);
      if (!site) return;
      const eid = currentEntity().id;
      if (!site.operatorId) site.operatorId = eid;
      myPartners().forEach(p => {
        p.siteNames = (p.siteNames || []).filter(n => n !== siteName);
      });
      if (partnerId) {
        const p = partnerById(partnerId);
        if (p) {
          if (!p.siteNames) p.siteNames = [];
          if (!p.siteNames.includes(siteName)) p.siteNames.push(siteName);
          site.partnerId = partnerId;
        }
      } else {
        delete site.partnerId;
      }
      syncPartnerSiteNames();
    }

    function partnerProfitOrderLines() {
      const f = getPf();
      const eid = currentEntity().id;
      return partnerProfitOrders.filter(o => {
        if (o.operatorId !== eid) return false;
        if (isPartnerLogin() && o.partnerId !== currentEmployee().id) return false;
        if (!filterPartnerSiteRow(o.site)) return false;
        if (state.partnerProfitSub !== "全部" && o.partnerId !== state.partnerProfitSub) return false;
        if (f.partnerId !== "全部" && o.partnerId !== f.partnerId) return false;
        if (f.site !== "全部" && o.site !== f.site) return false;
        if (f.orderType !== "全部" && o.orderType !== f.orderType) return false;
        if (!matchKw(o.orderId, f.orderId)) return false;
        if (!matchKw(o.phone, f.phone) && !matchKw(o.userId, f.phone)) return false;
        if (f.payout !== "全部" && o.payout !== f.payout) return false;
        return true;
      });
    }

    function entityNameById(entityId) {
      const role = ENTITY_ROLE[entityId];
      return role && ENT[role] ? ENT[role].name : entityId;
    }

    function findEmployeeGlobal(empId) {
      for (const entityId of Object.keys(employeeStore)) {
        const row = (employeeStore[entityId] || []).find(e => e.id === empId);
        if (row) return { ...row, entityId };
      }
      return null;
    }

    function currentEmployee() {
      if (!state.loginEmployeeId) return null;
      return findEmployeeGlobal(state.loginEmployeeId);
    }

    function isEntityLogin() { return !state.loginEmployeeId; }
    function isStaffLogin() { const e = currentEmployee(); return e && e.roleType === "staff"; }
    function isPartnerLogin() { const e = currentEmployee(); return e && e.roleType === "partner"; }

    function employeePerms() {
      const e = currentEmployee();
      if (!e) return [];
      if (e.roleType === "partner") return e.permissions && e.permissions.length ? e.permissions : PARTNER_DEFAULT_PERMS;
      return e.permissions || [];
    }

    function employeeHasPerm(permId) {
      if (isEntityLogin()) return true;
      return employeePerms().includes(permId);
    }

    function viewsForEmployeeLogin() {
      const views = new Set();
      if (isPartnerLogin()) {
        employeePerms().forEach(p => (PERM_VIEW_MAP[p] || []).forEach(v => views.add(v)));
        if (!views.size) PARTNER_DEFAULT_PERMS.forEach(p => (PERM_VIEW_MAP[p] || []).forEach(v => views.add(v)));
        return [...views];
      }
      employeePerms().forEach(p => (PERM_VIEW_MAP[p] || []).forEach(v => views.add(v)));
      return [...views];
    }

    function getAllowedNavItems() {
      if (isEntityLogin()) return NAV[state.role] || NAV.operator;
      const allowed = new Set(viewsForEmployeeLogin());
      const base = NAV[state.role] || NAV.operator;
      const items = base.filter(v => allowed.has(v));
      if (isPartnerLogin()) {
        const partnerNav = [];
        if (allowed.has("partnerAccount")) partnerNav.push("partnerAccount");
        if (allowed.has("partnerProfit")) partnerNav.push("partnerProfit");
        return partnerNav.length ? partnerNav : ["partnerAccount"];
      }
      return items.length ? items : ["overview"];
    }

    function canAccessView(view) {
      return getAllowedNavItems().includes(view);
    }

    function applyLoginKey(key) {
      state.loginKey = key;
      const [kind, id] = key.split(":");
      if (kind === "entity") {
        state.role = id;
        state.loginEmployeeId = null;
        return;
      }
      const emp = findEmployeeGlobal(id);
      if (!emp) return;
      state.loginEmployeeId = id;
      state.role = ENTITY_ROLE[emp.entityId] || "operator";
      if (emp.roleType === "partner") state.partnerProfitSub = emp.id;
    }

    function buildLoginSelectHtml() {
      const entityOpts = [
        ["operator", "合作运营商 · " + ENT.operator.name],
        ["l2", "二级代理商 · " + ENT.l2.name],

      ].map(([r, label]) => `<option value="entity:${r}">${label}</option>`).join("");
      let staffOpts = "";
      let partnerOpts = "";
      Object.keys(employeeStore).forEach(entityId => {
        (employeeStore[entityId] || []).forEach(e => {
          if (e.status !== "启用") return;
          const host = entityNameById(entityId);
          if (e.roleType === "staff") {
            staffOpts += `<option value="emp:${e.id}">${e.name} · ${e.jobTitle || "员工"}（${host}）</option>`;
          } else if (e.roleType === "partner") {
            partnerOpts += `<option value="emp:${e.id}">${e.name}（合作伙伴 · ${host}）</option>`;
          }
        });
      });
      return `<optgroup label="经营主体">${entityOpts}</optgroup>
        <optgroup label="员工登录">${staffOpts || "<option disabled>—</option>"}</optgroup>
        <optgroup label="合作伙伴登录">${partnerOpts || "<option disabled>—</option>"}</optgroup>`;
    }

    function filterPartnerSiteRow(siteName) {
      if (!isPartnerLogin()) return true;
      const e = currentEmployee();
      return (e.siteNames || []).includes(siteName);
    }

    function currentEntity() {
      return ENT[state.role] || ENT.operator;
    }

    function filterOwnRow(row) {
      if (!row || row.deviceOwnerId == null) return true;
      const e = currentEmployee();
      const ownerId = e ? e.entityId : currentEntity().id;
      return row.deviceOwnerId === ownerId;
    }

    function pfKey() {
      if (state.view === "orders") return "orders_" + state.orderTab;
      if (state.view === "flows") return "flows_" + state.flowTab;
      return state.view;
    }

    function getPf() {
      const key = pfKey();
      if (!state.pf[key]) state.pf[key] = { ...PF_DEFAULTS[key] };
      return state.pf[key];
    }

    function resetCurrentPf() {
      const key = pfKey();
      if (PF_DEFAULTS[key]) state.pf[key] = { ...PF_DEFAULTS[key] };
    }

    function matchKw(value, kw) {
      if (!kw || !String(kw).trim()) return true;
      return String(value || "").toLowerCase().includes(String(kw).trim().toLowerCase());
    }

    function matchDateStr(datetime, from, to) {
      if (!datetime) return true;
      const d = String(datetime).slice(0, 10);
      if (from && d < from) return false;
      if (to && d > to) return false;
      return true;
    }

    function renderFilterField(spec, f) {
      const val = f[spec.key] ?? "";
      if (spec.type === "select") {
        const opts = (typeof spec.options === "function" ? spec.options() : spec.options)
          .map(o => `<option value="${o.v}"${o.v === val ? " selected" : ""}>${o.t}</option>`).join("");
        return `<div class="field"><label>${spec.label}</label><select data-pf-field="${spec.key}">${opts}</select></div>`;
      }
      return `<div class="field"><label>${spec.label}</label><input type="${spec.type || "text"}" data-pf-field="${spec.key}" value="${val}" placeholder="${spec.placeholder || ""}"></div>`;

    function renderPageFilters() {
      const key = pfKey();
      const specs = PAGE_FILTER_SPECS[key];
      const box = document.querySelector("#pageFilters");
      const resetBtn = document.querySelector("#resetBtn");
      if (!specs || !specs.length) {
        box.classList.remove("visible");
        resetBtn.style.display = "none";
        box.innerHTML = "";
        return;
      }
      const f = getPf();
      box.innerHTML = specs.map(s => renderFilterField(s, f)).join("");
      box.classList.add("visible");
      resetBtn.style.display = "";
    }

    function bindPageFilters() {
      document.querySelectorAll("#pageFilters [data-pf-field]").forEach(el => {
        const field = el.dataset.pfField;
        const apply = () => {
          getPf()[field] = el.value;
          render();
        };
        if (el.tagName === "SELECT") el.addEventListener("change", apply);
        else el.addEventListener("change", apply);
      });
    }

    function filterPackageList(rows) {
      const f = getPf();
      return rows.filter(p => {
        if (!matchKw(p.id, f.orderId)) return false;
        if (!matchKw(p.phone, f.phone) && !matchKw(p.user, f.phone)) return false;
        if (f.status !== "全部" && p.status !== f.status) return false;
        if (f.serviceState !== "全部" && (p.serviceState || p.status) !== f.serviceState) return false;
        if (!matchDateStr(p.payTime, f.payFrom, f.payTo)) return false;
        return true;
      });
    }

    function filterSwapList(rows) {
      const f = getPf();
      return rows.filter(s => {
        if (!matchKw(s.id, f.swapId)) return false;
        if (!matchKw(s.phone, f.phone) && !matchKw(s.user, f.phone)) return false;
        if (f.status !== "全部" && s.status !== f.status) return false;
        if (!matchDateStr(s.time, f.timeFrom, f.timeTo)) return false;
        return true;
      });
    }

    function filterServiceChanges(rows) {
      const f = getPf();
      return rows.filter(sc => {
        if (!matchKw(sc.subId, f.orderId)) return false;
        if (!matchKw(sc.phone, f.phone) && !matchKw(sc.user, f.phone)) return false;
        if (f.type !== "全部" && sc.type !== f.type) return false;
        if (f.status !== "全部" && sc.status !== f.status) return false;
        return true;
      });
    }

    function filterFundReceipts(rows) {
      const f = getPf();
      return rows.filter(r => {
        if (!matchKw(r.order, f.orderId)) return false;
        if (f.flowType !== "全部" && r.type !== f.flowType) return false;
        if (!matchDateStr(r.time, f.timeFrom, f.timeTo)) return false;
        return true;
      });
    }

    function isLeasingRole() {
      return state.role === "leasing";
    }

    function ownershipCell(row) {
      if (row.ownership === "租赁") {
        const cid = row.leaseContractId
          ? `<button type="button" class="link-btn" data-open-lease="${row.leaseContractId}">${row.leaseContractId}</button>`
          : "—";
        return `${tag("租赁")}<br><small style="color:var(--muted)">出租 ${row.lessorName || "—"}</small><br>${cid}`;
      }
      return tag(row.ownership || "自有");
    }

    function myLeaseContracts() {
      const eid = currentEntity().id;
      if (isLeasingRole()) return leaseContracts.filter(c => c.lessorId === eid);
      return leaseContracts.filter(c => c.lesseeId === eid);
    }

    function myLeasedDevices() {
      const eid = currentEntity().id;
      if (isLeasingRole()) {
        const sns = new Set(leaseContracts.filter(c => c.lessorId === eid).flatMap(c => c.devices));
        return [...cabinets.filter(c => sns.has(c.sn)), ...batteries.filter(b => sns.has(b.sn))].map(d => ({
          sn: d.sn, type: d.slots != null ? "换电柜" : "电池", site: d.site, city: d.city,
          lesseeId: leaseContracts.find(c => c.devices.includes(d.sn))?.lesseeId,
          lesseeName: leaseContracts.find(c => c.devices.includes(d.sn))?.lesseeName,
          contractId: d.leaseContractId || leaseContracts.find(c => c.devices.includes(d.sn))?.id,
          status: "在租"
        }));
      }
      const leased = [...cabinets, ...batteries].filter(d => d.deviceOwnerId === eid && d.ownership === "租赁");
      return leased.map(d => ({
        sn: d.sn, type: d.slots != null ? "换电柜" : "电池", site: d.site, city: d.city,
        lessorName: d.lessorName, contractId: d.leaseContractId, status: "在租"
      }));
    }

    function repayProgress(contract) {
      const pct = contract.periods ? Math.round(contract.paidPeriods / contract.periods * 100) : 0;
      return { pct, label: `已还 ${contract.paidPeriods}/${contract.periods} 期 · ¥${contract.paidRent.toLocaleString("zh-CN")} / ¥${contract.totalRent.toLocaleString("zh-CN")}` };
    }

    function deviceChips(list) {
      return `<span class="device-chips">${list.map(sn => `<span class="device-chip">${sn}</span>`).join("")}</span>`;
    }

    function myLeaseRentBills() {
      const eid = currentEntity().id;
      return leaseRentBills.filter(b => b.lesseeId === eid).sort((a, b) => b.month.localeCompare(a.month));
    }

    function lessorCollectionRows() {
      return leaseRentBills.map(b => {
        const c = leaseContracts.find(x => x.id === b.contractId);
        const received = b.paidAmount || 0;
        const pending = Math.max(0, b.rentAmount - received);
        let collectStatus = "待收缴";
        if (b.status === "已还清") collectStatus = "已收缴";
        else if (b.status === "不足需处理") collectStatus = "待人工跟进";
        else if (b.status === "待还") collectStatus = "待收缴";
        const payLabel = b.payMode === "auto" ? "自动扣款" : b.payMode === "manual" ? "手动缴纳" : "—";
        return {
          ...b, lesseeName: c ? c.lesseeName : "—", devices: c ? c.devices : [],
          received, pending, collectStatus, payLabel
        };
      }).sort((a, b) => b.month.localeCompare(a.month));
    }

    function coverTag(bill) {
      if (bill.coverGap > 0) return tag("收益不足");
      return tag("可覆盖");
    }

    function rentGapBanner(bills) {
      const gaps = bills.filter(b => b.manualRequired && b.status !== "已还清");
      if (!gaps.length) return "";
      const totalGap = gaps.reduce((s, b) => s + b.coverGap, 0);
      return `<div class="rent-gap-banner">${noteBtn("lease_cover_gap")}
        <strong>${gaps.length} 笔账单收益无法覆盖租金</strong>，自动扣款未成功，差额合计 <strong>¥${totalGap.toLocaleString("zh-CN")}</strong>。
        请手动缴纳或补足运营收入后，在对应账单点击「处理缺口」。</div>`;
    }

    function employeeLoginBanner() {
      const emp = currentEmployee();
      if (!emp) return "";
      const permLabels = employeePerms().map(pid => EMP_PERMISSIONS.find(x => x.id === pid)?.label || pid).join("、");
      const scope = emp.roleType === "partner"
        ? `关联站点：${(emp.siteNames || []).join("、") || "—"}`
        : `数据范围：所属主体 ${entityNameById(emp.entityId)} 名下经营数据`;
      return `<div class="perm-banner">${noteBtn("employee_login")} ${noteBtn("employee_login_scope")}
        当前登录 <strong>${emp.name}</strong>（${emp.roleType === "partner" ? "合作伙伴" : "运营员工"} · ${emp.id}）· ${scope}
        <br>可见模块：${permLabels || "—"}</div>`;
    }

    function ownScopeBanner() {
      if (!isEntityLogin()) return employeeLoginBanner();
      const e = currentEntity();
      if (isLeasingRole()) {
        return `<div class="own-scope-banner">${noteBtn("lease_panel")} 当前登录 <strong>${e.name}</strong>：出租设备、租赁协议与承租方还款进度。</div>`;
      }

      const leaseHint = hasLease ? " 含<strong>租赁设备</strong>，见「协议与设备」「月租金」。" : "";

      return MODULE_NOTES[id] ? `<button type="button" class="module-note" data-note="${id}">说明</button>` : "";
    }

    function kpi(label, value, sub, icon, noteId) {
      return `<article class="kpi">
        <div class="kpi-head"><span>${label}</span><span class="kpi-head-actions">${noteBtn(noteId)}<span class="kpi-icon">${icon}</span></span></div>
        <div class="kpi-value">${value}</div>

    function tag(s) {
      const risk = ["退款", "故障", "离线", "建设", "预警", "冻结", "失败", "中途", "完结"];
      const warn = ["待", "处理", "结转", "可打"];
      const cls = risk.some(k => s.includes(k)) ? "risk" : warn.some(k => s.includes(k)) ? "warn" : s.includes("已打") || s.includes("完结") ? "neutral" : "";
      return `<span class="tag ${cls}">${s}</span>`;
    }

    function scale(n) {
      return Math.round(n * rangeMultiplier());
    }

    function updateScopeHint() {
      const emp = currentEmployee();
      const parts = emp ? [emp.name, emp.roleType === "partner" ? "合作伙伴" : "员工"] : [ROLE[state.role].name];
      const e = currentEntity();
      const ownerId = emp ? emp.entityId : e.id;
      let extra = isLeasingRole()
        ? "出租协议 " + myLeaseContracts().length + " 份"
        : state.view === "subProfit"
          ? "下级分润视图 · 不含自有设备订单"
          : state.view === "partnerProfit"
            ? (isPartnerLogin() ? "仅本合作方 · 关联站点订单" : "合作伙伴分润 · 关联站点订单明细")

              : "运营设备 " + cabinets.filter(c => c.deviceOwnerId === ownerId).length + " 台（含租赁）";

        "数据范围：" + parts.join(" · ") + " · " + extra + " " + noteBtn("scope") + (emp ? " " + noteBtn("employee_login_scope") : " " + noteBtn("asset_owner"));

          <div class="panel-body">

                <td>${x.city}</td><td>${x.contact}</td>
                <td><strong>${x.l1FromOpRate}%</strong></td>

          <div class="panel-body">
            <table>
              <thead><tr><th>名称</th><th>城市</th><th>联系人</th><th>二级抽成</th><th>站点</th><th>状态</th><th>待结转</th><th>操作</th></tr></thead>
              <tbody>${rows.map(x => `<tr>

                <td><strong>${x.l2FromOpRate}%</strong></td>

      if (!canAccessView("org")) {
        return `${ownScopeBanner()}<p class="scope-hint">当前账号无「组织管理」权限。</p>`;
      }
      if (state.role === "l1") {
        const tab = state.orgTab;
        const tabs = `<div class="tabs">
          <button type="button" class="${tab === "l2" ? "active" : ""}" data-orgtab="l2">二级代理商</button>

          <div class="perm-banner">${noteBtn("org_scope")} 各级主体可持有<strong>自有设备</strong>。一级<strong>不能</strong>管理二级名下的合作运营商（如「闪送驿站联营」设备订单不在「我的订单」中）。</div>

    function openOrgForm(mode, type, id) {
      state.orgForm = { mode, type, id: id || null };
      const isEdit = mode === "edit";
      let entity = {};
      if (isEdit) {
        if (type === "l2") entity = orgStore.l2Agents.find(x => x.id === id);
        else if (type === "l1op") entity = orgStore.l1DirectOps.find(x => x.id === id);
        else entity = myL2Merchants().find(x => x.id === id);
      }
      const titles = { l2: "二级代理商", l1op: "合作运营商（一级直属）", l2op: "合作运营商（二级直属）" };
      document.querySelector("#orgFormTitle").textContent = (isEdit ? "编辑" : "新增") + titles[type];

      let fields = "";
      if (type === "l2") {
        fields = `
          <label>名称<input name="name" required value="${entity.name || ""}"></label>
          <label>联系人<input name="contact" value="${entity.contact || ""}"></label>
          <label>一级抽成比例（%）<input name="l1FromL2Rate" type="number" min="0" max="100" step="0.1" required value="${entity.l1FromL2Rate ?? 20}"></label>
          <label>状态<select name="status"><option ${(entity.status || "启用") === "启用" ? "selected" : ""}>启用</option><option ${entity.status === "停用" ? "selected" : ""}>停用</option></select></label>`;
      } else if (type === "l1op") {
        fields = `
          <label>名称<input name="name" required value="${entity.name || ""}"></label>
          <label>城市<input name="city" value="${entity.city || "上海"}"></label>
          <label>联系人<input name="contact" value="${entity.contact || ""}"></label>
          <label>一级抽成比例（%）<input name="l1FromOpRate" type="number" min="0" max="100" step="0.1" required value="${entity.l1FromOpRate ?? 12}"></label>
          <label>状态<select name="status"><option ${(entity.status || "启用") === "启用" ? "selected" : ""}>启用</option><option ${entity.status === "停用" ? "selected" : ""}>停用</option></select></label>`;
      } else {
        fields = `
          <label>名称<input name="name" required value="${entity.name || ""}"></label>
          <label>城市<input name="city" value="${entity.city || "上海"}"></label>
          <label>联系人<input name="contact" value="${entity.contact || ""}"></label>
          <label>二级抽成比例（%）<input name="l2FromOpRate" type="number" min="0" max="100" step="0.1" required value="${entity.l2FromOpRate ?? 15}"></label>
          <label>站点数<input name="sites" type="number" min="0" value="${entity.sites ?? 1}"></label>
          <label>状态<select name="status"><option ${(entity.status || "启用") === "启用" ? "selected" : ""}>启用</option><option ${entity.status === "停用" ? "selected" : ""}>停用</option></select></label>`;
      }
      document.querySelector("#orgForm").innerHTML = fields;
      document.querySelector("#orgMask").classList.add("open");
      document.querySelector("#orgModal").classList.add("open");
    }

    function closeOrgForm() {
      state.orgForm = null;
      document.querySelector("#orgMask").classList.remove("open");
      document.querySelector("#orgModal").classList.remove("open");
    }

    function saveOrgForm() {
      const f = state.orgForm;
      if (!f) return;
      const fd = new FormData(document.querySelector("#orgForm"));
      const data = Object.fromEntries(fd.entries());
      const isEdit = f.mode === "edit";

      if (f.type === "l2") {
        const row = {
          id: f.id || "L2-" + Date.now(),
          name: data.name,
          contact: data.contact,
          l1FromL2Rate: parseFloat(data.l1FromL2Rate),
          status: data.status,
          pending: isEdit ? orgStore.l2Agents.find(x => x.id === f.id).pending : 0
        };
        if (isEdit) {
          const i = orgStore.l2Agents.findIndex(x => x.id === f.id);
          orgStore.l2Agents[i] = row;
        } else {
          orgStore.l2Agents.push(row);
          orgStore.l2Merchants[row.id] = [];
        }
      } else if (f.type === "l1op") {
        const row = {
          id: f.id || "OP-L1-" + Date.now(),
          name: data.name,
          city: data.city,
          contact: data.contact,
          l1FromOpRate: parseFloat(data.l1FromOpRate),
          status: data.status,
          pending: isEdit ? orgStore.l1DirectOps.find(x => x.id === f.id).pending : 0
        };
        if (isEdit) {
          const i = orgStore.l1DirectOps.findIndex(x => x.id === f.id);
          orgStore.l1DirectOps[i] = row;
        } else orgStore.l1DirectOps.push(row);
      } else {
        const list = orgStore.l2Merchants[CURRENT_L2_ID];
        const row = {
          id: f.id || "OP-L2-" + Date.now(),
          name: data.name,
          city: data.city,
          contact: data.contact,
          l2FromOpRate: parseFloat(data.l2FromOpRate),
          sites: parseInt(data.sites, 10) || 0,
          status: data.status,
          pending: isEdit ? list.find(x => x.id === f.id).pending : 0
        };
        if (isEdit) {
          const i = list.findIndex(x => x.id === f.id);
          list[i] = row;
        } else list.push(row);
      }
      closeOrgForm();
      render();
    }

    function bindOrgActions() {
      document.querySelectorAll("[data-org-add]").forEach(btn => {
        btn.onclick = () => openOrgForm("add", btn.dataset.orgAdd);
      });
      document.querySelectorAll("[data-org-edit]").forEach(btn => {
        btn.onclick = () => openOrgForm("edit", btn.dataset.orgEdit, btn.dataset.orgId);
      });
      document.querySelectorAll("[data-orgtab]").forEach(btn => {
        btn.onclick = () => { state.orgTab = btn.dataset.orgtab; render(); };
      });
    }

    function rangeMultiplier() {
      const ov = state.pf.overview || PF_DEFAULTS.overview;
      const r = ov.range || "30";
      return r === "7" ? 5.2 : r === "30" ? 18 : 1;
    }

    function siteBusinessStats() {
      const ov = state.pf.overview || PF_DEFAULTS.overview;
      const eid = currentEntity().id;
      const ownCabs = cabinets.filter(c => c.deviceOwnerId === eid);
      const siteNames = [...new Set(ownCabs.map(c => c.site))].sort();
      const m = rangeMultiplier();
      return siteNames.map(siteName => {
        if (!filterPartnerSiteRow(siteName)) return null;
        if (ov.site !== "全部" && ov.site !== siteName) return null;
        const siteMeta = sites.find(s => s.name === siteName) || { id: "—", city: "—", status: "—" };
        const pkgRows = packageOrders.filter(p => p.deviceOwnerId === eid && p.site === siteName);
        const swapRows = swapOrders.filter(s => s.deviceOwnerId === eid && s.site === siteName);
        const userIds = new Set([
          ...users.filter(u => u.deviceOwnerId === eid && u.site === siteName).map(u => u.id),
          ...pkgRows.map(p => p.user),
          ...swapRows.map(s => s.user)
        ]);
        const userCount = scale(userIds.size);
        const swapCount = scale(swapRows.filter(s => s.status === "成功").length);
        const orderAmount = Math.round(pkgRows.reduce((sum, p) => sum + p.pay, 0) * m);
        const cabinetsAtSite = ownCabs.filter(c => c.site === siteName).length;
        return {
          siteName,
          siteId: siteMeta.id,
          city: siteMeta.city,
          status: siteMeta.status,
          cabinets: cabinetsAtSite,
          userCount,
          swapCount,
          orderAmount
        };
      }).filter(Boolean);
    }

    function handlePayManual(billId) {
      const b = leaseRentBills.find(x => x.id === billId);
      if (!b || b.status === "已还清") return;
      b.status = "已还清";
      b.payMode = "manual";
      b.paidDate = "2026-05-24";
      b.paidAmount = b.rentAmount;
      b.manualRequired = false;
      b.coverGap = 0;
      b.autoStatus = "已改手动缴纳";
      const rep = leaseRepayments.find(r => r.contractId === b.contractId && r.status === "待还");
      if (rep) { rep.status = "已还"; rep.paidDate = b.paidDate; }
      const c = leaseContracts.find(x => x.id === b.contractId);
      if (c) { c.paidPeriods += 1; c.paidRent += b.rentAmount; }
      render();
    }

    function handleGap(billId) {
      const b = leaseRentBills.find(x => x.id === billId);
      if (!b) return;
      b.manualRequired = false;
      b.status = "处理中";
      b.autoStatus = "已登记人工处理，待补缴";
      render();

      const ownPending = os.filter(p => p.payout === "待结转").reduce((s, p) => s + p.accrued, 0);
      const ownReady = os.filter(p => p.payout === "可打款").reduce((s, p) => s + p.accrued, 0);
      const siteStatsPanel = renderOverviewSiteStats();
      if (state.role !== "operator") {
        const subRows = subProfitLedger.filter(r => r.viewer === state.role);
        const subPending = subRows.reduce((s, r) => s + r.pending, 0);
        return `
          ${ownScopeBanner()}
          <div class="kpi-grid">
            ${kpi("自有柜机", ownCabList.length, "在线 " + online + " 台", "柜", "asset_owner")}
            ${kpi("自有订单", os.length, "仅本主体设备产生", "单", "overview_orders")}
            ${kpi("自有待结转", "¥" + ownPending.toLocaleString("zh-CN"), "自有设备经营", "转", "payout_pkg")}
            ${kpi("下级分润待结转", "¥" + subPending.toLocaleString("zh-CN"), "见「下级分润」菜单 ★", "下", "sub_profit")}
          </div>
          <div class="kpi-grid">
            ${kpi("自有可打款", "¥" + ownReady.toLocaleString("zh-CN"), "已完结套餐", "款", "payout_pkg")}
            ${kpi("柜机在线率", rate + "%", "仅统计自有设备", "线", "overview_online")}
            ${kpi("可管理下级", state.role === "l1" ? orgStore.l2Agents.length + orgStore.l1DirectOps.length : myL2Merchants().length, "组织管理", "组", "org_scope")}
            ${kpi("在线率参考", scale(activeUsers), "自有站点骑手", "骑", "overview_users")}
          </div>
          ${siteStatsPanel}`;
      }
      const siteNames = [...new Set(ownCabList.map(c => c.site))];
      const partners = myPartners();
      const partnerPending = partners.reduce((s, p) => s + p.pending, 0);
      return `
        ${ownScopeBanner()}
        <div class="kpi-grid">
          ${kpi("自有柜机", ownCabList.length, "在线 " + online + " 台 · " + rate + "%", "柜", "asset_owner")}
          ${kpi("自有待结转", "¥" + ownPending.toLocaleString("zh-CN"), "周期完结后可分账", "转", "payout_pkg")}
          ${kpi("自有可打款", "¥" + ownReady.toLocaleString("zh-CN"), "已完结套餐", "款", "payout_pkg")}
          ${kpi("合作伙伴待付", "¥" + partnerPending.toLocaleString("zh-CN"), partners.length + " 家 · 员工+分润 ★", "合", "partner_profit")}
        </div>
        <div class="kpi-grid">
          ${kpi("活跃用户", scale(activeUsers), "去重骑手", "骑", "overview_users")}
          ${kpi("覆盖站点", siteNames.length, siteNames.join("、") || "—", "站", "overview_sites")}
          ${kpi("自有套餐单", os.length, "仅本站设备", "单", "overview_orders")}
          ${kpi("收款主体", PAYEE_OPERATOR, "架构B 二级商户", "收", "arch_b")}
        </div>
        ${siteStatsPanel}`;
    }

    function renderSites() {
      const ownSites = [...new Set(cabinets.filter(c => c.deviceOwnerId === currentEntity().id).map(c => c.site))];
      const f = getPf();
      const ss = sites.filter(s => {
        if (!ownSites.includes(s.name)) return false;
        if (!matchKw(s.name, f.siteName)) return false;
        if (f.city !== "全部" && s.city !== f.city) return false;
        if (f.status !== "全部" && s.status !== f.status) return false;
        return true;
      });
      const partnerCol = state.role === "operator" ? "<th>合作伙伴</th><th>操作</th>" : "";
      return `
        ${ownScopeBanner()}
        <section class="panel">
          ${panelHead("站点列表", "自有设备所在站点", "sites_panel")}
          <div class="panel-body">
            ${state.role === "operator" ? `<p style="font-size:12px;color:var(--muted);margin:0 0 12px">${noteBtn("partner_sites")} 站点分润合作方在「合作伙伴分润」中设置，数据来自「员工-合作伙伴」。</p>` : ""}
            <table>
              <thead><tr><th>站点</th><th>城市</th><th>类型</th><th>换电柜</th><th>电池</th><th>状态</th>${partnerCol}</tr></thead>
              <tbody>${ss.map(s => `<tr>
                <td>${s.name}<br><small style="color:var(--muted)">${s.id}</small></td>
                <td>${s.city}</td><td>${s.type}</td><td>${s.cabinets}</td><td>${s.batteries}</td><td>${tag(s.status)}</td>
                ${state.role === "operator" ? `<td>${partnerLabelForSite(s.name)}</td>
                <td class="row-actions">
                  <button type="button" class="link-btn" data-view-jump="partnerProfit">分润设置</button>
                </td>` : ""}
              </tr>`).join("") || `<tr><td colspan='${state.role === "operator" ? 8 : 6}'>暂无</td></tr>`}</tbody>
            </table>
          </div>
        </section>`;
    }

    function renderDevices() {
      const tab = state.deviceTab;
      const tabs = `<div class="tabs">
        <button type="button" class="${tab === "cabinet" ? "active" : ""}" data-dtab="cabinet">换电柜</button>
        <button type="button" class="${tab === "battery" ? "active" : ""}" data-dtab="battery">电池</button>
      </div>`;
      let body = "";
      if (tab === "cabinet") {
        const f = getPf();
        const rows = cabinets.filter(filterOwnRow).filter(c => {
          if (!matchKw(c.sn, f.sn) && !matchKw(c.site, f.sn)) return false;
          if (f.site !== "全部" && c.site !== f.site) return false;
          if (f.online === "online" && !c.online) return false;
          if (f.online === "offline" && c.online) return false;
          return true;
        });
        body = `<table><thead><tr><th>柜机编号</th><th>站点</th><th>运营主体</th><th>权属 ${noteBtn("device_ownership")}</th><th>仓口</th><th>状态</th><th>最近换电</th></tr></thead>
          <tbody>${rows.map(c => `<tr><td>${c.sn}</td><td>${c.site}</td><td>${c.deviceOwnerName}</td><td>${ownershipCell(c)}</td><td>${c.slots}</td><td>${tag(c.online ? "在线" : "离线故障")}</td><td>${c.lastSwap}</td></tr>`).join("") || "<tr><td colspan='7'>暂无自有设备</td></tr>"}</tbody></table>`;
      } else {
        const f = getPf();
        const rows = batteries.filter(filterOwnRow).filter(b => {
          if (!matchKw(b.sn, f.sn) && !matchKw(b.site, f.sn)) return false;
          if (f.site !== "全部" && b.site !== f.site) return false;
          return true;
        });
        body = `<table><thead><tr><th>电池 SN</th><th>站点</th><th>运营主体</th><th>权属</th><th>电量</th><th>健康</th><th>位置</th></tr></thead>
          <tbody>${rows.map(b => `<tr><td>${b.sn}</td><td>${b.site}</td><td>${b.deviceOwnerName}</td><td>${ownershipCell(b)}</td><td>${b.soc}%</td><td>${tag(b.health)}</td><td>${b.inCab}</td></tr>`).join("") || "<tr><td colspan='7'>暂无自有设备</td></tr>"}</tbody></table>`;
      }
      return `
        ${ownScopeBanner()}
        <section class="panel">
          ${panelHead("我的设备", "仅本人名下资产，可维护", tab === "cabinet" ? "devices_cab" : "devices_bat", tabs)}
          <div class="panel-body">${body}</div>
        </section>`;
    }

    function depositCell(p) {
      if (p.depositWaiver) {
        return `${tag("免押")}<br><small style="color:var(--muted)">${p.depositWaiver.type} ${p.depositWaiver.score}分</small>`;
      }
      if (p.batteryDeposit == null) return "—";
      const paid = (p.depositPaid || 0) >= p.batteryDeposit;
      return `¥${p.batteryDeposit}<br><small>${paid ? tag("已付押") : tag("待付押")}</small>`;
    }

    function serviceStateCell(p) {
      const s = p.serviceState || p.status;
      if (s === "已冻结") return tag("已冻结");
      if (s === "中途完结" || p.status === "中途完结") return tag("中途完结");
      if (p.status === "退款中") return tag("退款中");
      return tag(s === "服务中" ? "服务中" : s);
    }

    function pkgRefundSection(p) {
      if (!p.refundInfo) return "";
      const r = p.refundInfo;
      return `<section class="panel" style="margin:16px 0 0">
        ${panelHead("中途完结退款", r.refundStatus || "—", "orders_early_end")}
        <div class="panel-body" style="padding-top:0">
          <div class="detail-grid">
            <div class="detail-item"><span>未使用套餐</span><strong>¥${r.unusedService}</strong><br><small style="font-weight:400;color:var(--muted)">${r.unusedFormula || ""}</small></div>
            <div class="detail-item"><span>押金退还</span><strong>¥${r.depositRefund}</strong><br><small style="font-weight:400;color:var(--muted)">${r.depositStatus || ""}</small></div>
            <div class="detail-item"><span>应退合计</span><strong>¥${r.totalRefund}</strong></div>
            <div class="detail-item"><span>已退/待退</span><strong>¥${r.refunded} / ¥${r.pending}</strong></div>
          </div>
        </div>
      </section>`;
    }

    function pkgFreezeSection(p) {
      if (!p.freezeInfo) return "";
      const f = p.freezeInfo;
      return `<section class="panel" style="margin:16px 0 0">
        ${panelHead("冻结信息", "解冻后可继续使用原套餐", "orders_freeze")}
        <div class="panel-body" style="padding-top:0">
          <div class="detail-grid">
            <div class="detail-item"><span>申请时间</span><strong>${f.applyTime}</strong></div>
            <div class="detail-item"><span>冻结原因</span><strong>${f.reason}</strong></div>
            <div class="detail-item"><span>已冻结</span><strong>${f.frozenDays} 天</strong></div>
            <div class="detail-item"><span>顺延规则</span><strong>${f.resumeNote || "解冻后有效期顺延"}</strong></div>
          </div>
        </div>
      </section>`;
    }

    function pkgUsageText(p) {
      if (p.pkgType === "times") {
        const left = (p.swapLimit || 0) - p.swapUsed;
        return `已用 ${p.swapUsed}/${p.swapLimit} 次 · 剩 ${left} 次`;
      }
      return `期内已换电 ${p.swapUsed} 次`;
    }

    function swapsForPackage(subId) {
      return swapOrders.filter(s => s.subId === subId);
    }

    function swapOrderById(id) {
      return swapOrders.find(s => s.id === id);
    }

    function healthTag(health) {
      if (!health) return "—";
      return health.includes("预警") || health.includes("故障") ? tag(health) : tag(health);
    }

    function swapLogsFor(swapId, status) {
      if (swapOrderLogs[swapId]) return swapOrderLogs[swapId];
      return [
        { t: "—", kind: "user", type: "用户操作", text: "骑手发起换电（演示未录入全量日志）" },
        { t: "—", kind: "req", type: "请求", text: "换电流程 API 请求已受理" },
        { t: "—", kind: "dev", type: "设备反馈", text: "订单终态：" + status }
      ];
    }

    function renderSwapLogTimeline(swapId, status, inline) {
      const logs = swapLogsFor(swapId, status);
      const rows = logs.map(l => {
        const cls = ["log-item", l.kind, l.level === "fail" ? "fail" : l.level === "warn" ? "warn" : ""].filter(Boolean).join(" ");
        return `<div class="${cls}">
          <span class="log-time">${l.t}</span>
          <span class="log-type">${l.type}</span>
          <span>${l.text}</span>
        </div>`;
      }).join("");
      const timeline = `<div class="log-timeline">${rows}</div>`;
      if (inline) {
        return `<section class="panel" style="margin:0">
          ${panelHead("过程日志", `${logs.length} 条 · 用户操作 / 请求 / 设备`, "orders_swap_log")}
          <div class="panel-body" style="padding-top:0">${timeline}</div>
        </section>`;
      }
      return `<details class="swap-log" open>
        <summary>过程日志（${logs.length} 条）${noteBtn("orders_swap_log")} · 用户操作 / 请求 / 设备动作与反馈</summary>
        ${timeline}
      </details>`;
    }

    function swapAccrualTableHead() {
      if (state.role === "l1") return "<th>应分</th><th>合作方</th><th>二级</th><th>一级</th><th>结转</th>";
      if (state.role === "l2") return "<th>应分</th><th>合作方</th><th>二级</th><th>结转</th>";
      return "<th>应分</th><th>合作方</th><th>结转</th>";
    }

    function swapAccrualTableCells(s) {
      const dash = () => "<td>—</td>";
      if (s.status !== "成功" || s.alloc == null) {
        if (state.role === "l1") return dash() + dash() + dash() + dash() + dash();
        if (state.role === "l2") return dash() + dash() + dash() + dash();
        return dash() + dash() + dash();
      }
      if (state.role === "l1") {
        return `<td>¥${s.alloc}</td><td>¥${s.op}</td><td>¥${s.l2}</td><td>¥${s.l1}</td><td>${tag(s.accrual)}</td>`;
      }
      if (state.role === "l2") {
        return `<td>¥${s.alloc}</td><td>¥${s.op}</td><td>¥${s.l2}</td><td>${tag(s.accrual)}</td>`;
      }
      return `<td>¥${s.alloc}</td><td>¥${s.op}</td><td>${tag(s.accrual)}</td>`;
    }

    function swapTableRow(s, pkgMap) {
      const subCell = pkgMap[s.subId]
        ? `<button type="button" class="link-btn" data-open-sub="${s.subId}">${s.subId}</button>`
        : `<span style="color:var(--red)">未关联</span>`;
      const cab = s.cabinet || {};
      const cabOnline = cab.online === false ? tag("离线") : "";
      const batIn = s.batIn ? `${s.batIn.sn}<br><small>${s.batIn.soc}% · ${s.batIn.health}</small>` : "—";
      const batOut = s.batOut ? `${s.batOut.sn}<br><small>${s.batOut.soc}% · ${s.batOut.health}</small>` : "—";
      const logN = swapLogsFor(s.id, s.status).length;
      const statusCell = s.failReason
        ? `${tag(s.status)}<br><small style="color:var(--muted)">${s.failReason}</small>`
        : tag(s.status);
      return `<tr>
        <td><button type="button" class="link-btn" data-open-swap="${s.id}">${s.id}</button></td>
        <td>${subCell}</td>
        <td>${s.user}<br><small style="color:var(--muted)">${s.phone || ""}</small></td>
        <td>${s.site}<br><small style="color:var(--muted)">${s.siteId || ""}</small></td>
        <td>${cab.sn || "—"}${cabOnline ? "<br>" + cabOnline : ""}<br><small>${cab.slots || "—"}仓</small></td>
        <td>${s.slotIn != null ? "#" + s.slotIn : "—"}</td><td>${batIn}</td>
        <td>${s.slotOut != null ? "#" + s.slotOut : "—"}</td><td>${batOut}</td>
        <td>${statusCell}</td><td>${s.time}<br><small style="color:var(--muted)">${logN} 条日志</small></td>
        ${swapAccrualTableCells(s)}
        <td><button type="button" class="link-btn" data-open-swap="${s.id}">详情</button></td>
      </tr>`;
    }

    function openSwapDetail(swapId) {
      const s = swapOrders.find(x => x.id === swapId);

        <div class="detail-grid">

          <div class="detail-item"><span>站点</span><strong>${s.site}<br><small style="font-weight:400;color:var(--muted)">${s.siteId || ""} · ${s.city}</small></strong></div>
          <div class="detail-item"><span>换电柜</span><strong>${cab.sn || "—"} · ${cab.slots || "—"}仓<br><small style="font-weight:400">${cab.online === false ? "离线" : "在线"}</small></strong></div>

          <div class="detail-item"><span>换电格口</span><strong>${s.slotOut != null ? "#" + s.slotOut : "—"}</strong></div>
          <div class="detail-item"><span>换出电池</span><strong>${s.batOut ? `${s.batOut.sn} · SOC ${s.batOut.soc}% · ${s.batOut.health}` : "—"}</strong></div>
          <div class="detail-item"><span>订单状态</span><strong>${tag(s.status)}</strong></div>
        </div>
        ${renderSwapLogTimeline(s.id, s.status, true)}
      `;

      document.querySelector("#orderDrawer").classList.add("open");
      document.querySelector("#orderDrawer").setAttribute("aria-hidden", "false");
      bindNotes();
      document.querySelectorAll("[data-open-sub]").forEach(btn => {
        btn.onclick = () => openPackageDetail(btn.dataset.openSub);

      let usageLabel = "";
      if (p.pkgType === "times" && p.swapLimit) {
        usagePct = Math.min(100, Math.round(p.swapUsed / p.swapLimit * 100));
        usageLabel = `次数已用 ${usagePct}%（${p.swapUsed}/${p.swapLimit}）`;
      } else {
        usageLabel = `期内换电 ${p.swapUsed} 次 · 包月不限次`;
      }

      document.querySelector("#drawerTitle").textContent = "套餐订单 · " + p.id;
      document.querySelector("#drawerSub").textContent = `${p.pkg} · ${p.user} · ${p.status}`;
      document.querySelector("#drawerBody").innerHTML = `
        <div class="detail-grid">
          <div class="detail-item"><span>购买站点</span><strong>${p.site}</strong></div>
          <div class="detail-item"><span>设备归属</span><strong>${p.deviceOwnerName || "—"}</strong></div>
          <div class="detail-item"><span>主柜机</span><strong>${p.cabinet || "—"}</strong></div>

          <div class="detail-item"><span>收款主体</span><strong>${PAYEE_OPERATOR}</strong></div>
          <div class="detail-item"><span>进件商户</span><strong>${PAYEE_MCH.wx}</strong></div>
          <div class="detail-item"><span>支付时间</span><strong>${p.payTime}</strong></div>
          <div class="detail-item"><span>服务状态</span><strong>${serviceStateCell(p)}</strong></div>
          <div class="detail-item"><span>电池押金</span><strong>${depositCell(p)}</strong></div>
          <div class="detail-item"><span>有效期起</span><strong>${p.validFrom}</strong></div>
          <div class="detail-item"><span>有效期止</span><strong>${p.validTo}</strong></div>
          ${p.endTime ? `<div class="detail-item"><span>完结时间</span><strong>${p.endTime}</strong></div>` : ""}
          <div class="detail-item"><span>累计应分</span><strong>¥${p.accrued || 0}</strong></div>
          <div class="detail-item"><span>打款状态</span><strong>${tag(p.payout || "—")}</strong></div>
        </div>
        <p style="font-size:12px;color:var(--muted);margin:0 0 12px">
          ${noteBtn("orders_deposit")} ${noteBtn("orders_deposit_waiver")} ${noteBtn("orders_freeze")} ${noteBtn("orders_early_end")}

        ${pkgFreezeSection(p)}
        ${pkgRefundSection(p)}
        <section class="panel" style="margin:0">
          ${panelHead("有效期内使用情况", usageLabel, "orders_usage")}
          <div class="panel-body" style="padding-top:0">
            <div class="usage-bar"><i style="width:${usagePct}%"></i></div>
            <div class="detail-grid" style="margin-bottom:12px">

    function saveEmployeeForm() {
      const f = state.employeeForm;
      if (!f) return;
      const fd = new FormData(document.querySelector("#employeeForm"));
      const data = Object.fromEntries(fd.entries());
      const eid = currentEntity().id;
      if (!employeeStore[eid]) employeeStore[eid] = [];
      const isEdit = f.mode === "edit";
      const perms = fd.getAll("perm");
      const siteNames = fd.getAll("siteNames");

      if (f.roleType === "partner") {
        const row = {
          id: f.id || "EMP-" + Date.now(),
          roleType: "partner",
          name: data.name,
          contact: data.contact,
          profitRate: parseFloat(data.profitRate),
          rateLabel: "站点可分配收入 × 比例",
          siteNames: siteNames,
          status: data.status,
          loginPhone: data.contact,
          permissions: isEdit ? (employeeById(f.id)?.permissions || [...PARTNER_DEFAULT_PERMS]) : [...PARTNER_DEFAULT_PERMS],
          period: "2026-05",
          baseRevenue: isEdit ? (employeeById(f.id)?.baseRevenue || 0) : 0,
          partnerShare: isEdit ? (employeeById(f.id)?.partnerShare || 0) : 0,
          pending: isEdit ? (employeeById(f.id)?.pending || 0) : 0,
          orders: isEdit ? (employeeById(f.id)?.orders || 0) : 0
        };
        if (isEdit) {
          const idx = employeeStore[eid].findIndex(x => x.id === f.id);
          if (idx >= 0) employeeStore[eid][idx] = { ...employeeStore[eid][idx], ...row };
        } else {
          employeeStore[eid].push(row);
        }
        syncSitesFromPartnerEmployees();
      } else {
        const row = {
          id: f.id || "EMP-" + Date.now(),
          roleType: "staff",
          name: data.name,
          phone: data.phone,
          jobTitle: data.jobTitle,
          status: data.status,
          permissions: perms
        };
        if (isEdit) {
          const idx = employeeStore[eid].findIndex(x => x.id === f.id);
          if (idx >= 0) employeeStore[eid][idx] = { ...employeeStore[eid][idx], ...row };
        } else {
          employeeStore[eid].push(row);
        }
      }
      closeEmployeeForm();
      render();
    }

    function submitPartnerWithdraw() {
      const emp = currentEmployee();
      if (!emp || !isPartnerLogin() || !employeeHasPerm("partner_account.withdraw")) return;
      const acc = partnerAccountStore[emp.id];
      if (!acc) return;
      const input = document.querySelector("#withdrawAmount");
      const amt = parseFloat(input && input.value);
      if (!amt || amt <= 0 || amt > acc.withdrawable) {
        window.alert("请输入有效金额，且不超过可提现 ¥" + acc.withdrawable);
        return;
      }
      acc.withdrawable = Math.round((acc.withdrawable - amt) * 100) / 100;
      acc.balance = Math.round((acc.balance - amt) * 100) / 100;
      const p = partnerById(emp.id);
      if (p) p.pending = Math.max(0, Math.round(((p.pending || 0) - amt) * 100) / 100);
      acc.withdrawals.unshift({
        id: "WD" + Date.now(), amount: amt, fee: 0, status: "处理中",
        applyTime: new Date().toISOString().slice(0, 16).replace("T", " "),
        finishTime: null, channel: acc.bankAccount.includes("****") ? "对公/银行卡" : "银行卡"
      });
      if (input) input.value = "";
      render();
    }

        if (!matchKw(u.phone, f.phone)) return false;
        if (f.site !== "全部" && u.site !== f.site) return false;
        if (f.serviceState !== "全部" && (u.serviceState || "") !== f.serviceState) return false;
        return true;
      });
      return `
        ${ownScopeBanner()}
        <section class="panel">
          ${panelHead("用户列表", `共 ${us.length} 人`, "users_panel")}
          <div class="panel-body">
            <table>
              <thead><tr>
                <th>用户</th><th>主站点</th><th>套餐/服务</th><th>押金</th><th>期内换电</th><th>最近换电</th>
              </tr></thead>
              <tbody>${us.map(u => `<tr>
                <td>${u.id}<br><small style="color:var(--muted)">${u.phone}</small></td>
                <td>${u.site}</td>
                <td>${tag(u.serviceState || u.pkg)}<br><small style="color:var(--muted)">${u.pkg}</small></td>
                <td>${u.deposit || "—"}</td>
                <td>${scale(u.swaps)}</td>
                <td>${u.last}</td>
              </tr>`).join("") || "<tr><td colspan='6'>暂无</td></tr>"}</tbody>
            </table>
          </div>
        </section>`;
    }

    function bindNotes() {
      document.querySelectorAll("[data-note]").forEach(btn => {
        btn.onclick = e => {
          e.stopPropagation();
          const n = MODULE_NOTES[btn.dataset.note];
          if (!n) return;
          document.querySelector("#noteTitle").textContent = n.title;
          document.querySelector("#noteBody").textContent = n.content;
          document.querySelector("#noteModal").classList.add("open");
          document.querySelector("#noteMask").classList.add("open");
        };
      });
    }

    function render() {
      renderNav();
      syncTenantUi();
      updateScopeHint();
      const pageMeta = meta[state.view] || [NAV_LABEL[state.view] || "—", ""];
      document.querySelector("#pageTitle").textContent = pageMeta[0];
      document.querySelector("#pageDesc").textContent = pageMeta[1];
      const html = {
        overview: renderOverview(),
        org: renderOrg(),
        sites: renderSites(),
        devices: renderDevices(),
        leaseAgreements: renderLeaseAgreements(),
        leaseCollect: renderLeaseCollect(),
        leaseRent: renderLeaseRent(),
        orders: renderOrders(),
        flows: renderFlows(),
        subProfit: renderSubProfit(),
        employees: renderEmployees(),
        partnerProfit: renderPartnerProfit(),
        partnerAccount: renderPartnerAccount(),
        users: renderUsers(),
        accounts: renderAccounts()
      };
      document.querySelector("#views").innerHTML = Object.keys(html).map(k =>
        `<div class="view ${state.view === k ? "active" : ""}">${html[k]}</div>`
      ).join("");
      renderPageFilters();
      document.querySelectorAll("[data-dtab]").forEach(btn => {
        btn.onclick = () => { state.deviceTab = btn.dataset.dtab; render(); };
      });
      document.querySelectorAll("[data-otab]").forEach(btn => {
        btn.onclick = () => { state.orderTab = btn.dataset.otab; render(); };
      });
      document.querySelectorAll("[data-ftab]").forEach(btn => {
        btn.onclick = () => { state.flowTab = btn.dataset.ftab; render(); };
      });
      document.querySelectorAll("[data-spsub]").forEach(btn => {
        btn.onclick = () => { state.subProfitSub = btn.dataset.spsub; render(); };
      });
      document.querySelectorAll("[data-ppsub]").forEach(btn => {
        btn.onclick = () => { state.partnerProfitSub = btn.dataset.ppsub; render(); };
      });
      document.querySelectorAll("[data-emptab]").forEach(btn => {
        btn.onclick = () => { state.employeeTab = btn.dataset.emptab; render(); };
      });
      document.querySelectorAll("[data-employee-add-staff]").forEach(btn => {
        btn.onclick = () => openEmployeeForm("add", "staff");
      });
      document.querySelectorAll("[data-employee-add-partner]").forEach(btn => {
        btn.onclick = () => openEmployeeForm("add", "partner");
      });
      document.querySelectorAll("[data-employee-edit]").forEach(btn => {
        btn.onclick = () => {
          const emp = employeeById(btn.dataset.employeeEdit);
          if (emp) openEmployeeForm("edit", emp.roleType, emp.id);
        };
      });
      document.querySelectorAll(".profit-site-select").forEach(sel => {
        sel.onchange = () => {
          assignSitePartner(sel.dataset.profitSite, sel.value || null);
          render();
        };
      });
      document.querySelectorAll("[data-withdraw-submit]").forEach(btn => {
        btn.onclick = () => submitPartnerWithdraw();
      });
      document.querySelectorAll("[data-open-lease]").forEach(btn => {
        btn.onclick = () => openLeaseDetail(btn.dataset.openLease);
      });
      document.querySelectorAll("[data-pay-manual]").forEach(btn => {
        btn.onclick = () => handlePayManual(btn.dataset.payManual);
      });
      document.querySelectorAll("[data-handle-gap]").forEach(btn => {
        btn.onclick = () => handleGap(btn.dataset.handleGap);
      });
      document.querySelectorAll("[data-toggle-auto]").forEach(btn => {
        btn.onclick = () => toggleAutoDeduct(btn.dataset.toggleAuto);
      });
      document.querySelectorAll("[data-collect-follow]").forEach(btn => {
        btn.onclick = () => handleCollectFollow(btn.dataset.collectFollow);
      });
      document.querySelectorAll("[data-mock-action]").forEach(btn => {
        btn.onclick = () => window.alert("演示环境：" + btn.dataset.mockAction);
      });
      document.querySelectorAll("[data-approve-sc]").forEach(btn => {
        btn.onclick = () => {
          const sc = serviceChangeRequests.find(x => x.id === btn.dataset.approveSc);
          if (!sc || sc.type !== "解冻") return;
          sc.status = "已通过";
          const p = packageOrders.find(x => x.id === sc.subId);
          if (p) {
            p.status = "服务中";
            p.serviceState = "服务中";
            p.freezeInfo = null;
          }
          const u = users.find(x => x.id === sc.user);
          if (u) {
            u.pkg = "包月 · 剩21天（已顺延）";
            u.serviceState = "服务中";
          }
          render();
        };
      });
      document.querySelectorAll("[data-view-jump]").forEach(btn => {
        btn.onclick = () => {
          if (btn.dataset.empTab) state.employeeTab = btn.dataset.empTab;
          state.view = btn.dataset.viewJump;
          closeDrawer();
          render();
        };
      });
      document.querySelectorAll("[data-open-sub]").forEach(btn => {
        btn.onclick = () => openPackageDetail(btn.dataset.openSub);
      });
      document.querySelectorAll("[data-open-swap]").forEach(btn => {
        btn.onclick = () => openSwapDetail(btn.dataset.openSwap);
      });
      document.querySelectorAll("[data-goto-swap]").forEach(btn => {
        btn.onclick = () => {
          state.view = "orders";
          state.orderTab = "swap";
          state.detailSwapId = btn.dataset.gotoSwap;
          state.detailSubId = null;
          render();
        };
      });
      if (state.detailSubId) openPackageDetail(state.detailSubId);
      else if (state.detailSwapId) openSwapDetail(state.detailSwapId);
      else if (state.detailLeaseId) openLeaseDetail(state.detailLeaseId);
      bindOrgActions();
      bindPageFilters();
      bindNotes();
    }

    document.querySelector("#nav").addEventListener("click", e => {
      const btn = e.target.closest("button[data-view]");
      if (!btn) return;
      state.view = btn.dataset.view;
      closeDrawer();
      closeOrgForm();
      closeEmployeeForm();
      render();
    });

    document.querySelector("#loginSelect").addEventListener("change", e => {
      applyLoginKey(e.target.value);
      state.subProfitSub = "全部";
      if (!isPartnerLogin()) state.partnerProfitSub = "全部";
      state.employeeTab = "staff";
      const nav = getAllowedNavItems();
      state.view = nav.includes("overview") ? "overview" : nav.includes("partnerAccount") ? "partnerAccount" : nav[0];
      state.orgTab = "l2";
      closeDrawer();
      closeOrgForm();
      closeEmployeeForm();
      render();
    });

    applyLoginKey(state.loginKey);

    document.querySelector("#resetBtn").addEventListener("click", () => {
      resetCurrentPf();
      render();
    });

    function closeNote() {
      document.querySelector("#noteModal").classList.remove("open");
      document.querySelector("#noteMask").classList.remove("open");
    }
    document.querySelector("#closeNote").addEventListener("click", closeNote);
    document.querySelector("#noteMask").addEventListener("click", closeNote);
    document.querySelector("#closeDrawer").addEventListener("click", closeDrawer);
    document.querySelector("#drawerMask").addEventListener("click", closeDrawer);
    document.querySelector("#closeOrgForm").addEventListener("click", closeOrgForm);
    document.querySelector("#cancelOrgForm").addEventListener("click", closeOrgForm);
    document.querySelector("#orgMask").addEventListener("click", closeOrgForm);
    document.querySelector("#saveOrgForm").addEventListener("click", saveOrgForm);
    document.querySelector("#orgForm").addEventListener("submit", e => { e.preventDefault(); saveOrgForm(); });
    document.querySelector("#closeEmployeeForm").addEventListener("click", closeEmployeeForm);
    document.querySelector("#cancelEmployeeForm").addEventListener("click", closeEmployeeForm);
    document.querySelector("#employeeMask").addEventListener("click", closeEmployeeForm);
    document.querySelector("#saveEmployeeForm").addEventListener("click", saveEmployeeForm);
    document.querySelector("#employeeForm").addEventListener("submit", e => { e.preventDefault(); saveEmployeeForm(); });

    render();
  </script>
</body>
</html>
